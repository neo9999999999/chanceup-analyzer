<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0b">
<title>찬스업 당첨 분석기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0a0a0b;
  --card: #15151a;
  --border: #27272a;
  --text: #f4f4f5;
  --text-dim: #a1a1aa;
  --gold: #d4a849;
  --purple: #a78bfa;
  --green: #34d399;
  --accent: var(--gold);
}

body.premium { --accent: var(--purple); }
body.food { --accent: var(--green); }

body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 20px 16px 40px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.container { max-width: 720px; margin: 0 auto; }

.header { text-align: center; margin-bottom: 24px; }
.header .eyebrow {
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 8px;
}
.header h1 {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.sync-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 10px;
  padding: 4px 10px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 999px;
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 600;
}
.sync-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #6b7280;
  flex-shrink: 0;
}
.sync-status.synced .sync-dot { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
.sync-status.syncing .sync-dot { background: #eab308; animation: pulse 1s infinite; }
.sync-status.error .sync-dot { background: #ef4444; }
.sync-status.local .sync-dot { background: #6b7280; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  padding: 4px;
  background: var(--card);
  border-radius: 12px;
  border: 1px solid var(--border);
}
.tab {
  flex: 1;
  padding: 12px 8px;
  border: none;
  border-radius: 8px;
  background: transparent;
  color: var(--text-dim);
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
  white-space: nowrap;
}
.tab.active {
  background: var(--accent);
  color: #1a1a1a;
}

.card {
  background: var(--card);
  border-radius: 16px;
  padding: 20px;
  border: 1px solid var(--border);
  margin-bottom: 16px;
}
.card.highlight {
  border-color: rgba(212, 168, 73, 0.4);
  position: relative;
  overflow: hidden;
}
body.premium .card.highlight {
  border-color: rgba(167, 139, 250, 0.4);
}
body.food .card.highlight {
  border-color: rgba(52, 211, 153, 0.4);
}
.card.highlight::before {
  content: '';
  position: absolute;
  top: -30px;
  right: -30px;
  width: 120px;
  height: 120px;
  background: var(--accent);
  opacity: 0.08;
  border-radius: 50%;
  filter: blur(40px);
  pointer-events: none;
}

.card-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.05em;
  margin-bottom: 14px;
}

.input-row {
  display: grid;
  grid-template-columns: 1.2fr 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
}

input[type="number"] {
  padding: 12px 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
  text-align: center;
  outline: none;
  width: 100%;
  font-family: inherit;
  -moz-appearance: textfield;
  appearance: textfield;
}
input[type="number"]:focus { border-color: var(--accent); }
input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

.btn-primary {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: var(--accent);
  color: #1a1a1a;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
  transition: opacity 0.2s;
}
.btn-primary:active { opacity: 0.8; }

.best-range-display {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.best-range-num {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -0.02em;
}
.best-range-meta {
  font-size: 14px;
  color: var(--text-dim);
}
.best-range-meta strong {
  color: var(--accent);
  font-weight: 700;
}

/* 🎯 베팅 추천 카드 */
.betting-info {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 14px;
  padding: 10px 12px;
  background: var(--bg);
  border-radius: 8px;
  line-height: 1.5;
}
.betting-info strong {
  color: var(--accent);
  font-weight: 700;
}
.betting-section {
  margin-bottom: 14px;
}
.betting-section-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 10px;
  letter-spacing: 0.03em;
}
.betting-section-title.warn {
  color: #ef4444;
}
.betting-numbers {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.betting-number {
  background: var(--accent);
  color: #1a1a1a;
  border-radius: 10px;
  padding: 14px 8px;
  text-align: center;
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.02em;
  position: relative;
}
.betting-number .bn-count {
  position: absolute;
  top: 4px;
  right: 6px;
  font-size: 9px;
  font-weight: 700;
  background: rgba(0,0,0,0.2);
  border-radius: 999px;
  padding: 1px 6px;
  letter-spacing: 0.03em;
}
.betting-numbers.warn .betting-number {
  background: rgba(239, 68, 68, 0.15);
  color: #fca5a5;
  border: 1px solid rgba(239, 68, 68, 0.3);
}
.betting-numbers.warn .betting-number .bn-count {
  background: rgba(239, 68, 68, 0.3);
  color: #fff;
}
.betting-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin: 14px 0;
  padding: 14px;
  background: var(--bg);
  border-radius: 10px;
  border: 1px solid var(--border);
}
.betting-stat {
  text-align: center;
}
.betting-stat-label {
  font-size: 10px;
  color: var(--text-dim);
  font-weight: 600;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
}
.betting-stat-value {
  font-size: 18px;
  font-weight: 800;
  color: var(--accent);
}
.betting-empty {
  text-align: center;
  padding: 20px;
  color: var(--text-dim);
  font-size: 13px;
}

/* 1등 흐름 분석 */
.flow-recent {
  display: flex;
  flex-wrap: wrap;
  row-gap: 6px;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
  margin-bottom: 14px;
  padding: 14px;
  background: var(--bg);
  border-radius: 12px;
}
.flow-step {
  font-size: 12px;
  font-weight: 500;
  padding: 6px 10px;
  background: rgba(255,255,255,0.03);
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-dim);
  white-space: nowrap;
}
.flow-step.latest {
  background: var(--accent);
  color: #1a1a1a;
  border-color: var(--accent);
}
.flow-step-num {
  opacity: 0.6;
  font-size: 10px;
  margin-left: 3px;
}
.flow-step.latest .flow-step-num { opacity: 0.8; }
.flow-arrow {
  color: var(--text-dim);
  font-size: 11px;
  opacity: 0.5;
}

.flow-pred-header {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 12px;
  line-height: 1.5;
}
.flow-pred-header strong {
  color: var(--accent);
  font-weight: 700;
}
.flow-pred-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.flow-pred-item {
  padding: 10px 14px;
  background: var(--bg);
  border-radius: 10px;
  position: relative;
  overflow: hidden;
}
.flow-pred-item.top {
  border: 1px solid var(--accent);
}
.flow-pred-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 1;
}
.flow-pred-decade {
  font-size: 14px;
  font-weight: 700;
}
.flow-pred-stat {
  font-size: 12px;
  color: var(--accent);
  font-weight: 700;
}
.flow-pred-bar {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  background: var(--accent);
  opacity: 0.1;
  border-radius: 10px;
  transition: width 0.3s;
}

/* 흐름 예측 통계 */
.flow-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 16px;
}
.flow-stat-item {
  padding: 12px 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  text-align: center;
}
.flow-stat-label {
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 600;
  margin-bottom: 4px;
}
.flow-stat-value {
  font-size: 18px;
  font-weight: 800;
  color: var(--text);
}
.flow-stat-value.success { color: #22c55e; }
.flow-stat-value.fail { color: #ef4444; }


/* 1등 흐름 색상 강조 (반복 패턴) */
.flow-step.repeat-2,
.flow-step.repeat-3 {
  background: rgba(212, 168, 73, 0.08);
  border-color: rgba(212, 168, 73, 0.3);
  color: var(--accent);
}
body.premium .flow-step.repeat-2,
body.premium .flow-step.repeat-3 {
  background: rgba(167, 139, 250, 0.08);
  border-color: rgba(167, 139, 250, 0.3);
  color: var(--purple);
}
body.food .flow-step.repeat-2,
body.food .flow-step.repeat-3 {
  background: rgba(52, 211, 153, 0.08);
  border-color: rgba(52, 211, 153, 0.3);
  color: var(--green);
}

/* 반복 적중 번호 테이블 */
.repeat-table {
  display: flex;
  flex-direction: column;
  gap: 1px;
  background: var(--border);
  border-radius: 10px;
  overflow: hidden;
  max-height: 420px;
  overflow-y: auto;
}
.repeat-row {
  display: grid;
  grid-template-columns: 56px 50px 1fr;
  gap: 8px;
  align-items: center;
  padding: 10px 14px;
  background: var(--card);
  font-size: 12px;
}
.repeat-row.head {
  background: var(--bg);
  font-size: 11px;
  font-weight: 700;
  color: var(--text-dim);
  letter-spacing: 0.05em;
  padding: 8px 14px;
  position: sticky;
  top: 0;
  z-index: 1;
}
.rt-num {
  font-size: 16px;
  font-weight: 800;
  color: var(--accent);
}
.rt-count {
  font-size: 12px;
  color: var(--text);
  font-weight: 700;
}
.rt-history {
  font-size: 11px;
  color: var(--text-dim);
  word-break: keep-all;
  line-height: 1.4;
}
.rt-history strong {
  color: var(--text);
  font-weight: 600;
}


.hits-list, .rank-list, .repeat-list, .rounds-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 280px;
  overflow-y: auto;
}
.rounds-list { max-height: 400px; }

.hit-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: var(--bg);
  border-radius: 8px;
  font-size: 13px;
}
.hit-round { color: var(--text-dim); min-width: 44px; flex-shrink: 0; }

.rank-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--bg);
  border-radius: 10px;
}
.rank-left { display: flex; align-items: center; gap: 12px; }
.rank-pill {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-dim);
  background: var(--card);
  padding: 2px 8px;
  border-radius: 999px;
}
.rank-range { font-size: 16px; font-weight: 700; }
.rank-count { font-size: 13px; color: var(--accent); font-weight: 700; }

.repeat-item {
  padding: 10px 14px;
  background: var(--bg);
  border-radius: 10px;
}
.repeat-header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.repeat-num {
  font-size: 22px;
  font-weight: 800;
  color: var(--accent);
  min-width: 44px;
}
.repeat-count { font-size: 12px; color: var(--text-dim); font-weight: 600; }
.repeat-history {
  font-size: 11px;
  color: var(--text-dim);
  padding-left: 54px;
  word-break: keep-all;
}

.round-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  background: var(--bg);
  border-radius: 8px;
  font-size: 13px;
}
.round-left {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
  min-width: 0;
  flex-wrap: wrap;
}
.round-num {
  font-weight: 700;
  color: var(--text);
  min-width: 44px;
}
.badges { display: flex; flex-wrap: wrap; gap: 4px; }
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  color: #1a1a1a;
}
.badge-1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
.badge-2 { background: linear-gradient(135deg, #d1d5db, #9ca3af); color: #1f2937; }
.badge-3 { background: linear-gradient(135deg, #fb923c, #c2410c); }
.badge-label { opacity: 0.7; font-size: 10px; }

.delete-btn {
  border: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  padding: 8px 12px;
  font-size: 20px;
  opacity: 0.5;
  font-family: inherit;
  flex-shrink: 0;
  min-width: 36px;
  min-height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  transition: all 0.15s;
}
.delete-btn:hover, .delete-btn:active {
  opacity: 1;
  color: #ef4444;
  background: rgba(239, 68, 68, 0.1);
}
.delete-btn * {
  pointer-events: none;
}

.empty-state {
  padding: 32px;
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
}

.flex-between {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}
.muted { font-size: 11px; color: var(--text-dim); }

.footer {
  text-align: center;
  padding: 20px;
  font-size: 11px;
  color: var(--text-dim);
  opacity: 0.7;
}

.footer-actions {
  display: flex;
  justify-content: center;
  gap: 8px;
}

.footer-btn {
  padding: 8px 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-dim);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}
.footer-btn:hover, .footer-btn:active {
  border-color: var(--accent);
  color: var(--accent);
}

/* 모바일 */
@media (max-width: 480px) {
  body { padding: 16px 12px 40px; }
  .header h1 { font-size: 22px; }
  .best-range-num { font-size: 26px; }
  .input-row { grid-template-columns: 1fr 1fr; }
  .input-row input:first-child { grid-column: 1 / -1; }
  .card { padding: 16px; }
  .repeat-history { padding-left: 0; margin-top: 6px; }
}

/* 스크롤바 */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* 잠금 화면 */
.lock-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  padding: 20px;
}
.lock-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px 24px;
  width: 100%;
  max-width: 360px;
  text-align: center;
}
.lock-icon {
  font-size: 36px;
  margin-bottom: 14px;
}
.lock-title {
  font-size: 18px;
  font-weight: 800;
  margin-bottom: 6px;
  letter-spacing: -0.01em;
}
.lock-sub {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 22px;
}
.lock-input {
  width: 100%;
  padding: 14px 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 16px;
  font-weight: 600;
  text-align: center;
  outline: none;
  font-family: inherit;
  letter-spacing: 0.3em;
  transition: border-color 0.15s;
}
.lock-input:focus { border-color: var(--accent); }
.lock-error {
  font-size: 12px;
  color: #ef4444;
  margin-top: 10px;
  min-height: 16px;
  font-weight: 600;
}
.lock-btn {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border: none;
  border-radius: 12px;
  background: var(--accent);
  color: #1a1a1a;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
  transition: opacity 0.2s;
}
.lock-btn:active { opacity: 0.8; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-6px); }
  40%, 80% { transform: translateX(6px); }
}
.lock-card.shake { animation: shake 0.3s; }
</style>
</head>
<body>

<!-- 잠금 화면 -->
<div class="lock-screen" id="lock-screen">
  <div class="lock-card" id="lock-card">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">찬스업 분석기</div>
    <div class="lock-sub">비밀번호를 입력하세요</div>
    <input type="password" class="lock-input" id="lock-input" inputmode="numeric" autocomplete="off" autofocus>
    <div class="lock-error" id="lock-error"></div>
    <button class="lock-btn" id="lock-btn">잠금 해제</button>
  </div>
</div>

<div class="container" id="main-content" style="display:none;">
  <div class="header">
    <div class="eyebrow">CHANCEUP ANALYZER</div>
    <h1>찬스업 당첨 분석기</h1>
    <div class="sync-status" id="sync-status">
      <span class="sync-dot"></span>
      <span class="sync-text">연결 중...</span>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="basic">🍫 기본</button>
    <button class="tab" data-tab="premium">💎 프리미엄</button>
    <button class="tab" data-tab="food">🍱 푸드박스</button>
  </div>

  <!-- 회차 등록 -->
  <div class="card">
    <div class="card-title">⊕ 회차 등록</div>
    <div class="input-row">
      <input type="number" id="inp-round" placeholder="회차" inputmode="numeric">
      <input type="number" id="inp-first" placeholder="1등" inputmode="numeric">
      <input type="number" id="inp-second" placeholder="2등" inputmode="numeric">
      <input type="number" id="inp-third" placeholder="3등" inputmode="numeric">
    </div>
    <button class="btn-primary" id="btn-add">등록</button>
  </div>

  <!-- 🎯 베팅 추천 -->
  <div class="card highlight" id="betting-card" style="display:none;">
    <div class="card-title" id="betting-title">🎯 베팅 추천</div>
    <div class="betting-info" id="betting-info"></div>
    <div class="betting-section">
      <div class="betting-section-title">🔥 추천 번호 10개 (2회 우선, 보충)</div>

function mergeWithInitial(localArr, initialArr) {
  var byRound = {};
  for (var i = 0; i < initialArr.length; i++) {
    byRound[initialArr[i].round] = initialArr[i];
  }
  for (var j = 0; j < localArr.length; j++) {
    byRound[localArr[j].round] = localArr[j];  // local이 우선
  }
  var merged = [];
  for (var k in byRound) merged.push(byRound[k]);
  merged.sort(function (a, b) { return a.round - b.round; });
  return merged;
}

// 1등 번호 → 10단위 구간 (1: 1-10, 2: 11-20, ..., 10: 91-100)
function getDecade(n) {
  if (n === 100) return 10;
  return Math.ceil(n / 10);
}
function decadeLabel(d) {
  if (d === 1) return '1~10';
  if (d === 10) return '91~100';
  return ((d - 1) * 10 + 1) + '~' + (d * 10);
}

function analyzeFlow(rows) {
  if (rows.length < 2) return null;
  var sorted = rows.slice();
  sorted.sort(function (a, b) { return a.round - b.round; });

  var transitions = {};  // {fromDecade: {toDecade: count}}
  var sequence = [];     // [{round, decade, num}]

  for (var i = 0; i < sorted.length; i++) {
    var d = getDecade(sorted[i].first);
    sequence.push({ round: sorted[i].round, decade: d, num: sorted[i].first });
    if (i > 0) {
      var prev = getDecade(sorted[i - 1].first);
      if (!transitions[prev]) transitions[prev] = {};
      if (!transitions[prev][d]) transitions[prev][d] = 0;
      transitions[prev][d]++;
    }
  }

  // 매 회차 예측 검증 (i번째 시점에 i-1까지의 누적 데이터로 i를 예측했다면 성공/실패 판정)
  // 기준 A (top1): 누적 분포에서 1위 구간이 실제 적중했는지
  // 기준 B (any): 누적 분포에 한번이라도 등장한 구간이 실제 적중했는지
  var predictions = [];
  for (var k = 2; k < sorted.length; k++) {
    // sorted[k]를 예측: sorted[0..k-1]까지의 데이터로 transitions 누적 계산
    var pastTrans = {};
    for (var m = 1; m < k; m++) {
      var pPrev = getDecade(sorted[m - 1].first);
      var pCurr = getDecade(sorted[m].first);
      if (!pastTrans[pPrev]) pastTrans[pPrev] = {};
      if (!pastTrans[pPrev][pCurr]) pastTrans[pPrev][pCurr] = 0;
      pastTrans[pPrev][pCurr]++;
    }
    var fromDecade = getDecade(sorted[k - 1].first);
    var actualDecade = getDecade(sorted[k].first);
    var distrib = pastTrans[fromDecade] || {};
    var distribEntries = [];
    for (var dKey in distrib) {
      distribEntries.push({ decade: parseInt(dKey, 10), count: distrib[dKey] });
    }
    distribEntries.sort(function (a, b) { return b.count - a.count; });

    var hasData = distribEntries.length > 0;
    var topDecade = hasData ? distribEntries[0].decade : null;
    var topHit = hasData && (topDecade === actualDecade);
    var anyHit = false;
    for (var dei = 0; dei < distribEntries.length; dei++) {
      if (distribEntries[dei].decade === actualDecade) { anyHit = true; break; }
    }
    predictions.push({
      round: sorted[k].round,
      fromDecade: fromDecade,
      actualDecade: actualDecade,
      actualNum: sorted[k].first,
      topDecade: topDecade,
      topHit: topHit,
      anyHit: anyHit,
      hasData: hasData
    });
  }

  return { sequence: sequence, transitions: transitions, predictions: predictions };
}

// 🎯 베팅 추천 분석 (최근 20회 1·2·3등 빈도)
function analyzeBetting(rows) {
  // 알고리즘 H: 1·2·3등 가중치 + tier 우선 + 인접±1 보너스
  if (rows.length < 1) {
    return { picked: [], dup3: [], windowSize: 0, stats: BETTING_STATS[currentTab] || BETTING_STATS.basic };
  }
  var sorted = rows.slice();
  sorted.sort(function(a, b) { return a.round - b.round; });
  var window20 = sorted.slice(-20);
  var counter = {}, lastSeen = {}, rawCount = {};
  for (var i = window20.length - 1; i >= 0; i--) {
    var r = window20[i];
    var nums = [r.first, r.second, r.third];
    var weights = [3, 2, 1];
    for (var j = 0; j < 3; j++) {
      var n = nums[j];
      counter[n] = (counter[n] || 0) + weights[j];
      rawCount[n] = (rawCount[n] || 0) + 1;
      if (lastSeen[n] === undefined) lastSeen[n] = r.round;
    }
  }
  var tier1 = [], tier2 = [], tier3 = [];
  for (var k in counter) {
    var item = { n: parseInt(k, 10), score: counter[k], cnt: rawCount[k], lr: lastSeen[k] };
    if (counter[k] >= 8) tier1.push(item);
    else if (counter[k] >= 4) tier2.push(item);
    else tier3.push(item);
  }
  var sorter = function(a, b) {
    if (b.score !== a.score) return b.score - a.score;
    if (b.lr !== a.lr) return b.lr - a.lr;
    return a.n - b.n;
  };
  tier1.sort(sorter); tier2.sort(sorter); tier3.sort(sorter);
  var pickedSet = {}, pickedArr = [];
  function add(n, src) {
    if (pickedArr.length >= 10) return false;
    if (pickedSet[n]) return false;
    pickedSet[n] = true;
    pickedArr.push({ n: n, source: src });
    return true;
  }
  for (var p1 = 0; p1 < tier1.length; p1++) add(tier1[p1].n, 'core');
  for (var p2 = 0; p2 < tier2.length; p2++) add(tier2[p2].n, 'mid');
  if (pickedArr.length < 10) {
    var pivots = tier1.concat(tier2);
    for (var pv = 0; pv < pivots.length && pickedArr.length < 10; pv++) {
      var pn = pivots[pv].n;
      if (pn > 1) add(pn - 1, 'neighbor');
      if (pickedArr.length >= 10) break;
      if (pn < 100) add(pn + 1, 'neighbor');
    }
  }
  for (var p3 = 0; p3 < tier3.length && pickedArr.length < 10; p3++) add(tier3[p3].n, 'low');
  var picked = pickedArr.slice();
  picked.sort(function(a, b) { return a.n - b.n; });
  var dup3 = tier1.map(function(t) { return t.n; });
  dup3.sort(function(a, b) { return a - b; });
  return {
    picked: picked,
    dup3: dup3,
    windowSize: window20.length,
    stats: BETTING_STATS[currentTab] || BETTING_STATS.basic
  };
}

    var coreList = [], strongList = [], normalList = [];
    for (var k in counter) {
      var item = { n: parseInt(k, 10), score: counter[k], lr: lastSeen[k] };
      if (counter[k] >= 8) coreList.push(item);
      else if (counter[k] >= 4) strongList.push(item);
      else normalList.push(item);
    }
    var sorter = function(a, b) {
      if (b.score !== a.score) return b.score - a.score;
      if (b.lr !== a.lr) return b.lr - a.lr;
      return a.n - b.n;
    };
    coreList.sort(sorter); strongList.sort(sorter); normalList.sort(sorter);

    var picked = {}, cnt = 0;
    function tryAdd(n) {
      if (n < 1 || n > 100) return;
      if (picked[n]) return;
      if (cnt >= 10) return;
      picked[n] = true;
      cnt++;
    }
    for (var p = 0; p < coreList.length; p++) tryAdd(coreList[p].n);
    for (var q = 0; q < strongList.length; q++) tryAdd(strongList[q].n);
    var pivots = coreList.concat(strongList);
    for (var r2 = 0; r2 < pivots.length && cnt < 10; r2++) {
      tryAdd(pivots[r2].n - 1);
      if (cnt < 10) tryAdd(pivots[r2].n + 1);
    }
    for (var s = 0; s < normalList.length && cnt < 10; s++) tryAdd(normalList[s].n);
    return picked;
  }

  var h1 = 0, h2 = 0, h3 = 0, total = 0;
  for (var k = 20; k < sorted.length; k++) {
    var win = sorted.slice(k - 20, k);
    var picked = pickFromWindow(win);
    var actual = sorted[k];
    if (picked[actual.first]) h1++;
    if (picked[actual.second]) h2++;
    if (picked[actual.third]) h3++;
    total++;
  }
  return { h1: h1, h2: h2, h3: h3, total: total };
}
.length === 0) return [];
  var counter = {};
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var nums = [
      { n: r.first, label: r.round + '·1등' },
      { n: r.second, label: r.round + '·2등' },
      { n: r.third, label: r.round + '·3등' }
    ];
    for (var j = 0; j < nums.length; j++) {
      var key = nums[j].n;
      if (!counter[key]) counter[key] = [];
      counter[key].push(nums[j].label);
    }
  }
  var result = [];
  for (var k in counter) {
    if (counter[k].length >= 2) {
      result.push({
        number: parseInt(k, 10),
        count: counter[k].length,
        history: counter[k]
      });
    }
  }
  result.sort(function (a, b) {
    if (b.count !== a.count) return b.count - a.count;
    return a.number - b.number;
  });
  return result;
}

// ============ 렌더링 ============
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}

function render() {
  var rows = getCurrent();

  // 탭 활성화
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) {
    if (tabs[i].dataset.tab === currentTab) {
      tabs[i].classList.add('active');
    } else {
      tabs[i].classList.remove('active');
    }
  }
  if (currentTab === 'premium') {
    document.body.classList.add('premium');
    document.body.classList.remove('food');
  } else if (currentTab === 'food') {
    document.body.classList.add('food');
    document.body.classList.remove('premium');
  } else {
    document.body.classList.remove('premium');
    document.body.classList.remove('food');
  }

  // 회차 카운트
  document.getElementById('round-count').textContent = '총 ' + rows.length + '회차';

  // 🎯 베팅 추천 (최근 20회 1·2·3등 빈도 분석)
  var bettingCard = document.getElementById('betting-card');
  var betting = analyzeBetting(rows);
  if (betting) {
    bettingCard.style.display = 'block';

    // 다음 회차 번호
    var maxR = 0;
    for (var br = 0; br < rows.length; br++) {
      if (rows[br].round > maxR) maxR = rows[br].round;
    }
    var nextRound = maxR + 1;

    document.getElementById('betting-title').innerHTML =
      '🎯 ' + nextRound + '회 베팅 추천';
    document.getElementById('betting-info').innerHTML =
      '최근 ' + betting.windowSize + '회 1·2·3등에서 <strong>2회 출현 우선</strong>으로 10개 추천' +
      ' · 부족 시 최신 회차 보충';

    // 추천 번호 (딱 2회만)
    var dup2 = betting.dup2;
    if (dup2.length > 0) {
      var n2Html = '';
      for (var i2 = 0; i2 < dup2.length; i2++) {
        n2Html += '<div class="betting-number">' +
          '<span class="bn-count">' + dup2[i2].count + '회</span>' +
          dup2[i2].number +
          '</div>';
      }
      document.getElementById('betting-numbers-2').innerHTML = n2Html;
    } else {
      document.getElementById('betting-numbers-2').innerHTML =
        '<div class="betting-empty">최근 ' + betting.windowSize + '회 안에 2회 출현 번호가 없음</div>';
    }

    // 검증 적중률 (게임별)
    var stats = betting.stats;
    document.getElementById('betting-stats').innerHTML =
      '<div class="betting-stat">' +
        '<div class="betting-stat-label">1등 적중</div>' +
        '<div class="betting-stat-value">' + stats.p1 + '%</div>' +
      '</div>' +
      '<div class="betting-stat">' +
        '<div class="betting-stat-label">1·2등 적중</div>' +
        '<div class="betting-stat-value">' + stats.p12 + '%</div>' +
      '</div>' +
      '<div class="betting-stat">' +
        '<div class="betting-stat-label">1·2·3등 적중</div>' +
        '<div class="betting-stat-value">' + stats.pany + '%</div>' +
      '</div>';

    // 식어가는 3회+ 번호 (제외 표시)
    var dup3 = betting.dup3;
    if (dup3.length > 0) {
      document.getElementById('betting-warn-section').style.display = 'block';
      var n3Html = '';
      for (var i3 = 0; i3 < dup3.length; i3++) {
        n3Html += '<div class="betting-number">' +
          '<span class="bn-count">' + dup3[i3].count + '회</span>' +
          dup3[i3].number +
          '</div>';
      }
      document.getElementById('betting-numbers-warn').innerHTML = n3Html;
    } else {
      document.getElementById('betting-warn-section').style.display = 'none';
    }
  } else {
    bettingCard.style.display = 'none';
  }

  // 🌊 1등 흐름 분석 (간소화, 반복 패턴 색상 강조)
  var flow = analyzeFlow(rows);
  var flowCard = document.getElementById('flow-card');
  if (flow && flow.sequence.length >= 2) {
    flowCard.style.display = 'block';

    // 최근 흐름 (최대 7회) + 반복 구간 색상 강조
    var recent = flow.sequence.slice(-20);
    // 각 decade의 등장 횟수 카운트 (recent 안에서)
    var decadeCount = {};
    for (var fc = 0; fc < recent.length; fc++) {
      var dc = recent[fc].decade;
      decadeCount[dc] = (decadeCount[dc] || 0) + 1;
    }

    var recentHtml = '';
    for (var fi = 0; fi < recent.length; fi++) {
      if (fi > 0) recentHtml += '<span class="flow-arrow">→</span>';
      var isLatest = (fi === recent.length - 1);
      var dCount = decadeCount[recent[fi].decade];
      var cls = 'flow-step';
      if (isLatest) cls += ' latest';
      else if (dCount >= 3) cls += ' repeat-3';
      else if (dCount === 2) cls += ' repeat-2';
      recentHtml += '<span class="' + cls + '">' +
        decadeLabel(recent[fi].decade) +
        '<span class="flow-step-num">' + recent[fi].num + '</span>' +
        '</span>';
    }
    document.getElementById('flow-recent').innerHTML = recentHtml;

    // 베팅 추천 백테스트 통계 (1등/2등/3등 적중)
    var bt = analyzeBettingBacktest(rows);
    var statsHtml = '';
    if (bt && bt.total > 0) {
      statsHtml = '<div class="flow-stats">' +
        '<div class="flow-stat-item">' +
          '<div class="flow-stat-label">1등 적중</div>' +
          '<div class="flow-stat-value success">' + bt.h1 + '/' + bt.total + '</div>' +
        '</div>' +
        '<div class="flow-stat-item">' +
          '<div class="flow-stat-label">2등 적중</div>' +
          '<div class="flow-stat-value success">' + bt.h2 + '/' + bt.total + '</div>' +
        '</div>' +
        '<div class="flow-stat-item">' +
          '<div class="flow-stat-label">3등 적중</div>' +
          '<div class="flow-stat-value success">' + bt.h3 + '/' + bt.total + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="muted" style="text-align:center;font-size:11px;margin-top:8px;">베팅 추천 기준 · 21회차부터 ' + bt.total + '회 검증</div>';
    }
    document.getElementById('flow-stats-only').innerHTML = statsHtml;
  } else {
    flowCard.style.display = 'none';
  }

  // 🔁 반복 적중 번호 (테이블 형식)
  var repeats = findRepeatNumbers(rows);
  var repeatCard = document.getElementById('repeat-card');
  if (repeats.length > 0) {
    repeatCard.style.display = 'block';
    var rTable = '<div class="repeat-table">' +
      '<div class="repeat-row head">' +
        '<span>번호</span>' +
        '<span>출현</span>' +
        '<span>당첨 회차</span>' +
      '</div>';
    var rLimit = Math.min(repeats.length, 30);
    for (var rm = 0; rm < rLimit; rm++) {
      var rp = repeats[rm];
      // 회차 history를 강조
      var historyParts = [];
      for (var rh = 0; rh < rp.history.length; rh++) {
        historyParts.push('<strong>' + escapeHtml(rp.history[rh]) + '</strong>');
      }
      rTable += '<div class="repeat-row">' +
        '<span class="rt-num">' + rp.number + '</span>' +
        '<span class="rt-count">' + rp.count + '회</span>' +
        '<span class="rt-history">' + historyParts.join(' · ') + '</span>' +
        '</div>';
    }
    rTable += '</div>';
    document.getElementById('repeat-table').innerHTML = rTable;
  } else {
    repeatCard.style.display = 'none';
  }

  // 회차별 테이블
  var roundsList = document.getElementById('rounds-list');
  if (rows.length === 0) {
    roundsList.innerHTML = '<div class="empty-state">등록된 회차가 없습니다</div>';
  } else {
    var sorted = rows.slice();
    sorted.sort(function (a, b) { return b.round - a.round; });
    var roundsHtml = '';
    for (var n = 0; n < sorted.length; n++) {
      var row = sorted[n];
      roundsHtml += '<div class="round-item">' +
        '<div class="round-left">' +
          '<span class="round-num">' + row.round + '</span>' +
          '<div class="badges">' +
            '<span class="badge badge-1"><span class="badge-label">1등</span>' + row.first + '</span>' +
            '<span class="badge badge-2"><span class="badge-label">2등</span>' + row.second + '</span>' +
            '<span class="badge badge-3"><span class="badge-label">3등</span>' + row.third + '</span>' +
          '</div>' +
        '</div>' +
        '<button class="delete-btn" data-round="' + row.round + '">×</button>' +
        '</div>';
    }
    roundsList.innerHTML = roundsHtml;

    // 삭제 버튼
    var delBtns = roundsList.querySelectorAll('.delete-btn');
    for (var d = 0; d < delBtns.length; d++) {
      delBtns[d].addEventListener('click', function (e) {
        e.stopPropagation();
        var roundNum = parseInt(this.getAttribute('data-round'), 10);
        if (!isNaN(roundNum)) {
          handleDelete(roundNum);
        }
      });
    }
  }

  // 다음 회차 자동 채움 (입력 비어있을 때만)
  var roundInput = document.getElementById('inp-round');
  if (roundInput && !roundInput.value) {
    fillNextRound();
  }
}

// ============ 액션 ============
function handleAdd() {
  var r = parseInt(document.getElementById('inp-round').value, 10);
  var f = parseInt(document.getElementById('inp-first').value, 10);
  var s = parseInt(document.getElementById('inp-second').value, 10);
  var t = parseInt(document.getElementById('inp-third').value, 10);

  if (!r || !f || !s || !t) {
    alert('모든 항목을 입력해주세요');
    return;
  }
  if (f < 1 || f > 100 || s < 1 || s > 100 || t < 1 || t > 100) {
    alert('번호는 1~100 사이여야 합니다');
    return;
  }

  var current = getCurrent();
  var existing = null;
  for (var i = 0; i < current.length; i++) {
    if (current[i].round === r) {
      existing = current[i];
      break;
    }
  }

  if (existing) {
    if (!confirm(r + '회차가 이미 존재합니다. 덮어쓸까요?')) return;
    existing.first = f;
    existing.second = s;
    existing.third = t;
  } else {
    current.push({ round: r, first: f, second: s, third: t });
    current.sort(function (a, b) { return a.round - b.round; });
  }

  saveData();
  render();

  // 입력 비우기 + 다음 회차 자동 채움
  document.getElementById('inp-first').value = '';
  document.getElementById('inp-second').value = '';
  document.getElementById('inp-third').value = '';
  fillNextRound();
  document.getElementById('inp-first').focus();
}

function fillNextRound() {
  var current = getCurrent();
  var roundInput = document.getElementById('inp-round');
  if (current.length === 0) {
    roundInput.value = '';
    return;
  }
  var maxRound = 0;
  for (var i = 0; i < current.length; i++) {
    if (current[i].round > maxRound) maxRound = current[i].round;
  }
  roundInput.value = maxRound + 1;
}

function handleDelete(roundNum) {
  if (!confirm(roundNum + '회차를 삭제할까요?')) return;
  var current = getCurrent();
  var filtered = [];
  for (var i = 0; i < current.length; i++) {
    if (current[i].round !== roundNum) {
      filtered.push(current[i]);
    }
  }
  data[currentTab] = filtered;
  saveData();
  render();
}

function handleExport() {
  var payload = {
    version: 1,
    exported_at: new Date().toISOString(),
    basic: data.basic,
    premium: data.premium,
    food: data.food
  };
  var blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  var ts = new Date().toISOString().slice(0, 10);
  a.download = 'chanceup-backup-' + ts + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function handleImport(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function (ev) {
    try {
      var parsed = JSON.parse(ev.target.result);
      if (!parsed || (!parsed.basic && !parsed.premium && !parsed.food)) {
        alert('잘못된 백업 파일입니다');
        return;
      }
      var msg = '복원하면 현재 데이터가 덮어써집니다.\n계속할까요?\n\n';
      if (parsed.basic) msg += '기본: ' + parsed.basic.length + '회차\n';
      if (parsed.premium) msg += '프리미엄: ' + parsed.premium.length + '회차\n';
      if (parsed.food) msg += '푸드박스: ' + parsed.food.length + '회차';
      if (!confirm(msg)) return;

      if (parsed.basic) data.basic = parsed.basic;
      if (parsed.premium) data.premium = parsed.premium;
      if (parsed.food) data.food = parsed.food;
      saveData();
      render();
      alert('복원 완료!');
    } catch (err) {
      alert('파일을 읽을 수 없습니다: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ============ 초기화 ============
async function init() {
  // 일단 localStorage에서 로드 (즉시 렌더)
  loadData();

  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].addEventListener('click', function (e) {
      currentTab = e.currentTarget.dataset.tab;
      // 탭 전환 시 입력 필드 초기화 후 새 탭의 회차로 갱신
      document.getElementById('inp-round').value = '';
      document.getElementById('inp-first').value = '';
      document.getElementById('inp-second').value = '';
      document.getElementById('inp-third').value = '';
      render();
      fillNextRound();
    });
  }

  document.getElementById('btn-add').addEventListener('click', handleAdd);

  // 백업/복원
  document.getElementById('btn-export').addEventListener('click', handleExport);
  document.getElementById('btn-import').addEventListener('click', function () {
    document.getElementById('file-input').click();
  });
  document.getElementById('file-input').addEventListener('change', handleImport);

  // 엔터로 등록
  var inputs = ['inp-round', 'inp-first', 'inp-second', 'inp-third'];
  for (var j = 0; j < inputs.length; j++) {
    document.getElementById(inputs[j]).addEventListener('keypress', function (e) {
      if (e.key === 'Enter') handleAdd();
    });
  }

  render();

  // Supabase 초기화 + 원격 데이터 로드
  setSyncStatus('syncing', '연결 중...');
  if (initSupabase()) {
    var remote = await loadFromSupabase();
    if (remote) {
      // 원격 데이터가 있으면 로컬보다 우선 (마지막 저장이 ground truth)
      if (Array.isArray(remote.basic)) data.basic = remote.basic;
      if (Array.isArray(remote.premium)) data.premium = remote.premium;
      if (Array.isArray(remote.food)) data.food = remote.food;
      // 로컬에도 백업
      try {
        localStorage.setItem(STORAGE_KEY_BASIC, JSON.stringify(data.basic));
        localStorage.setItem(STORAGE_KEY_PREMIUM, JSON.stringify(data.premium));
        localStorage.setItem(STORAGE_KEY_FOOD, JSON.stringify(data.food));
      } catch (e) {}
      render();
    } else {
      // 원격에 데이터 없으면 로컬 데이터로 첫 동기화
      var hasAny = data.basic.length > 0 || data.premium.length > 0 || data.food.length > 0;
      if (hasAny) {
        await saveToSupabase();
      }
    }
  } else {
    setSyncStatus('local', '로컬 모드');
  }
}

// ============ 비밀번호 게이트 ============
var PASSWORD_HASH = '8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92';
var AUTH_KEY = 'chanceup_auth_v1';

async function sha256Hex(text) {
  var buf = new TextEncoder().encode(text);
  var hash = await crypto.subtle.digest('SHA-256', buf);
  var arr = Array.from(new Uint8Array(hash));
  return arr.map(function (b) { return b.toString(16).padStart(2, '0'); }).join('');
}

function unlock() {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
  init();
}

async function tryUnlock() {
  var input = document.getElementById('lock-input');
  var err = document.getElementById('lock-error');
  var card = document.getElementById('lock-card');
  var pw = input.value;
  if (!pw) return;
  var hash = await sha256Hex(pw);
  if (hash === PASSWORD_HASH) {
    try { localStorage.setItem(AUTH_KEY, 'true'); } catch (e) {}
    unlock();
  } else {
    err.textContent = '비밀번호가 틀려요';
    card.classList.add('shake');
    setTimeout(function () { card.classList.remove('shake'); }, 300);
    input.value = '';
    input.focus();
  }
}

function bootGate() {
  // 비밀번호 제거: 항상 자동 해제
  try { localStorage.setItem(AUTH_KEY, 'true'); } catch(e) {}
  unlock();
  return;
  // 아래는 비활성화 (남겨두지만 도달 안 함)
  try {
    if (localStorage.getItem(AUTH_KEY) === 'true') {
      unlock();
      return;
    }
  } catch (e) {}

  // 잠금 화면 이벤트 바인딩
  var btn = document.getElementById('lock-btn');
  var input = document.getElementById('lock-input');
  btn.addEventListener('click', tryUnlock);
  input.addEventListener('keypress', function (e) {
    if (e.key === 'Enter') tryUnlock();
  });
  input.focus();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', bootGate);
} else {
  bootGate();
}
