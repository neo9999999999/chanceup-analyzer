      var tip = hh.round + '회 1등 ' + hh.first;
      if (rk === 2) tip += ' · 2등 ' + hh.second + ' 적중';
      else if (rk === 3) tip += ' · 3등 ' + hh.third + ' 적중';
      html += '<span class="predict-hit ' + hcls + '" title="' + tip + '">' + (rk ? '○' : '×') + '</span>';
    }
    html += '</div>';
    // 실패 커버 번호: 최근 100회 중 예측이 빗나간 회차들의 1·2·3등 최다 출현 4개
    // (밴드+인접 ±2 제외 · 동률이면 최신 우선 · 통계적 엣지 없음 — 사각지대 커버용)
    var missCnt = {}, missLast = {};
    for (var mi = 0; mi < acc.recent.length; mi++) {
      var mr = acc.recent[mi];
      if (mr.rank !== 0) continue;  // 적중 회차 제외
      var mNums = [mr.first, mr.second, mr.third];
      for (var mj = 0; mj < mNums.length; mj++) {
        var mn = mNums[mj];
        if (mn == null || mn < 1 || mn > 100) continue;
        if (mn >= pr.start - 2 && mn <= pr.end + 2) continue;
        missCnt[mn] = (missCnt[mn] || 0) + 1;
        missLast[mn] = mr.round;
      }
    }
    var bonus = Object.keys(missCnt).map(Number);
    bonus.sort(function(a, b) {
      return missCnt[b] - missCnt[a] || missLast[b] - missLast[a] || a - b;
    });
    bonus = bonus.slice(0, 12);
    if (bonus.length > 0) {
      var bHtml = '<span class="predict-numdetail-label">추가 추천 12 (예측 구간 ' + pr.start + '~' + pr.end +
                  ' 제외 · 예측 빗나간 회차의 최다 당첨수순 · 참고용)</span>';
      for (var bj = 0; bj < bonus.length; bj++) {
        bHtml += '<span class="predict-num-chip bonus-chip" title="실패 회차에 ' + missCnt[bonus[bj]] + '회 출현 (마지막 ' + missLast[bonus[bj]] + '회)">' +
                 '<span class="prio-rank">' + (bj + 1) + '</span>' +
                 '<b class="predict-num">' + bonus[bj] + '</b>' +
                 '<span class="rk-txt rk3-txt">' + missCnt[bonus[bj]] + '회</span></span>';
      }
      html += '<div class="predict-numdetail predict-bonus">' + bHtml + '</div>';
    }
    document.getElementById('flow-predict').innerHTML = html;
    predictCard.style.display = 'block';
  } else {
    predictCard.style.display = 'none';
  }

  // (추천 히스토리 카드 제거됨 — 사용자 요청)

  // 🏆 최근 1등 빈도 TOP 10 (최근 40회, 회차 등록할 때마다 순위 변동)
  var topFreqCard = document.getElementById('topfreq-card');
  var freqResult = _topFrequencyNumbers(rows, 40, 10);
  if (freqResult.top.length > 0) {
    topFreqCard.style.display = 'block';
    var fHtml = '<div class="topfreq-info">최근 ' + freqResult.windowSize + '회 1등 출현 횟수 순위 · 회차 등록할 때마다 갱신</div>';
    fHtml += '<table class="rank-prob-table topfreq-table"><thead><tr>' +
      '<th>순위</th><th>번호</th><th>1등 출현</th><th>비율</th>' +
      '</tr></thead><tbody>';
    for (var fi = 0; fi < freqResult.top.length; fi++) {
      var ft = freqResult.top[fi];
      var rankCls = fi < 3 ? 'topfreq-rank-top3' : '';
      var rankEmoji = fi === 0 ? '🥇' : fi === 1 ? '🥈' : fi === 2 ? '🥉' : (fi+1);
      var pct = freqResult.windowSize > 0 ? Math.round(ft.c1 / freqResult.windowSize * 100) : 0;
      fHtml += '<tr class="' + rankCls + '">' +
        '<td class="col-rank">' + rankEmoji + '</td>' +
        '<td class="col-num">' + ft.num + '</td>' +
        '<td class="col-1">' + ft.c1 + '회</td>' +
        '<td class="col-sum">' + pct + '%</td>' +
        '</tr>';
    }
    fHtml += '</tbody></table>';
    document.getElementById('topfreq-table').innerHTML = fHtml;
  } else {
    topFreqCard.style.display = 'none';
  }

  // 회차별 테이블
  var roundsList = document.getElementById('rounds-list');
  if (rows.length === 0) {
    roundsList.innerHTML = '<div class="empty-state">등록된 회차가 없습니다</div>';
  } else {
    var sorted = rows.slice();
    sorted.sort(function (a, b) { return b.round - a.round; });
    var roundsHtml = '';
    for (var n = 0; n < sorted.length; n++) {
      var row = sorted[n];
      roundsHtml += '<div class="round-item">' +
        '<div class="round-left">' +
          '<span class="round-num">' + row.round + '</span>' +
          '<div class="badges">' +
            '<span class="badge badge-1"><span class="badge-label">1등</span>' + row.first + '</span>' +
            '<span class="badge badge-2"><span class="badge-label">2등</span>' + row.second + '</span>' +
            '<span class="badge badge-3"><span class="badge-label">3등</span>' + row.third + '</span>' +
          '</div>' +
        '</div>' +
        '<button class="delete-btn" data-round="' + row.round + '">×</button>' +
        '</div>';
    }
    roundsList.innerHTML = roundsHtml;

    // 삭제 버튼
    var delBtns = roundsList.querySelectorAll('.delete-btn');
    for (var d = 0; d < delBtns.length; d++) {
      delBtns[d].addEventListener('click', function (e) {
        e.stopPropagation();
        var roundNum = parseInt(this.getAttribute('data-round'), 10);
        if (!isNaN(roundNum)) {
          handleDelete(roundNum);
        }
      });
    }
  }

  // 다음 회차 자동 채움 (입력 비어있을 때만)
  var roundInput = document.getElementById('inp-round');
  if (roundInput && !roundInput.value) {
    fillNextRound();
  }
}

// ============ 액션 ============
function handleAdd() {
  var r = parseInt(document.getElementById('inp-round').value, 10);
  var f = parseInt(document.getElementById('inp-first').value, 10);
  var s = parseInt(document.getElementById('inp-second').value, 10);
  var t = parseInt(document.getElementById('inp-third').value, 10);

  if (!r || !f || !s || !t) {
    alert('모든 항목을 입력해주세요');
    return;
  }
  if (f < 1 || f > 100 || s < 1 || s > 100 || t < 1 || t > 100) {
    alert('번호는 1~100 사이여야 합니다');
    return;
  }

  var current = getCurrent();
  var existing = null;
  for (var i = 0; i < current.length; i++) {
    if (current[i].round === r) {
      existing = current[i];
      break;
    }
  }

  // ★ 추천 히스토리 자동 저장 — 그 시점 추천을 캡처해서 결과랑 매칭
  // (회차 추가 전 시점의 추천 시퀀스를 저장, 실제 결과로 적중 여부 자동 계산)
  if (!existing) {
    var snapshotData = current.slice().sort(function(a,b){return a.round-b.round;});
    var cfgSnap = ALGO_CONFIG[currentTab] || { window: 20, weights: [1,1,1] };
    var hr = _slidingHotRange(snapshotData, cfgSnap.window, cfgSnap.weights);
    if (hr && hr.top && hr.top[0]) {
      var hits1 = (f >= hr.top[0].start && f <= hr.top[0].end);
      var hits2 = (s >= hr.top[0].start && s <= hr.top[0].end);
      var hits3 = (t >= hr.top[0].start && t <= hr.top[0].end);
      var hitCount = (hits1 ? 1 : 0) + (hits2 ? 1 : 0) + (hits3 ? 1 : 0);
      _saveRecHistory(currentTab, {
        round: r,
        recStart: hr.top[0].start,
        recEnd: hr.top[0].end,
        algoWindow: cfgSnap.window,
        algoWeights: cfgSnap.weights,
        actualFirst: f, actualSecond: s, actualThird: t,
        hit1: hits1, hit2: hits2, hit3: hits3,
        hitCount: hitCount,
        ts: new Date().toISOString()
      });
    }
  }

  if (existing) {
    if (!confirm(r + '회차가 이미 존재합니다. 덮어쓸까요?')) return;
    existing.first = f;
    existing.second = s;
    existing.third = t;
  } else {
    current.push({ round: r, first: f, second: s, third: t });
    current.sort(function (a, b) { return a.round - b.round; });
  }

  saveData();
  // ★ 추가할 때마다 즉시 클라우드 저장 (debounce 안 기다리고 바로, read-merge-write로 안전)
  if (supabaseReady) { saveToSupabase(); }
  render();

  // 입력 비우기 + 다음 회차 자동 채움
  document.getElementById('inp-first').value = '';
  document.getElementById('inp-second').value = '';
  document.getElementById('inp-third').value = '';
  fillNextRound();
  document.getElementById('inp-first').focus();
}

function fillNextRound() {
  var current = getCurrent();
  var roundInput = document.getElementById('inp-round');
  if (current.length === 0) {
    roundInput.value = '';
    return;
  }
  var maxRound = 0;
  for (var i = 0; i < current.length; i++) {
    if (current[i].round > maxRound) maxRound = current[i].round;
  }
  roundInput.value = maxRound + 1;
}

function handleDelete(roundNum) {
  if (!confirm(roundNum + '회차를 삭제할까요?')) return;
  var current = getCurrent();
  var filtered = [];
  for (var i = 0; i < current.length; i++) {
    if (current[i].round !== roundNum) {
      filtered.push(current[i]);
    }
  }
  data[currentTab] = filtered;
  saveData();
  render();
}

function handleExport() {
  var payload = {
    version: 1,
    exported_at: new Date().toISOString(),
    basic: data.basic,
    premium: data.premium,
    food: data.food
  };
  var blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  var ts = new Date().toISOString().slice(0, 10);
  a.download = 'chanceup-backup-' + ts + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function handleImport(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function (ev) {
    try {
      var parsed = JSON.parse(ev.target.result);
      if (!parsed || (!parsed.basic && !parsed.premium && !parsed.food)) {
        alert('잘못된 백업 파일입니다');
        return;
      }
      var msg = '복원 파일을 현재 데이터와 합칩니다 (덮어쓰기 X, 회차 합집합).\n계속할까요?\n\n';
      if (parsed.basic) msg += '기본: ' + parsed.basic.length + '회차\n';
      if (parsed.premium) msg += '프리미엄: ' + parsed.premium.length + '회차\n';
      if (parsed.food) msg += '푸드박스: ' + parsed.food.length + '회차';
      if (!confirm(msg)) return;

      // ★ 덮어쓰기 X → union 합치기 (기존 회차 보존)
      if (parsed.basic)   data.basic   = unionRounds(data.basic,   parsed.basic,   true);
      if (parsed.premium) data.premium = unionRounds(data.premium, parsed.premium, true);
      if (parsed.food)    data.food    = unionRounds(data.food,    parsed.food,    true);
      saveData();
      if (supabaseReady) { saveToSupabase(); }
      render();
      alert('복원 완료! 기본 ' + data.basic.length + '회 / 프리미엄 ' + data.premium.length + '회 / 푸드 ' + data.food.length + '회');
    } catch (err) {
      alert('파일을 읽을 수 없습니다: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ============ 초기화 ============
// 🔄 수동 새로고침: 로컬 히스토리 복구 + 클라우드 양방향 동기화 후 화면 갱신
async function manualRefresh() {
  try {
    setSyncStatus('syncing', '동기화 중...');
    loadData();
    recoverFromRecHistory();   // 로컬 추천 히스토리 → 회차 복구
    if (supabaseReady || initSupabase()) {
      var remote = await loadFromSupabase();
      if (remote) {
        data.basic   = unionRounds(data.basic,   Array.isArray(remote.basic)   ? remote.basic   : [], true);
        data.premium = unionRounds(data.premium, Array.isArray(remote.premium) ? remote.premium : [], true);
        data.food    = unionRounds(data.food,    Array.isArray(remote.food)    ? remote.food    : [], true);
      }
      try {
        localStorage.setItem(STORAGE_KEY_BASIC, JSON.stringify(data.basic));
        localStorage.setItem(STORAGE_KEY_PREMIUM, JSON.stringify(data.premium));
        localStorage.setItem(STORAGE_KEY_FOOD, JSON.stringify(data.food));
      } catch (e) {}
      await saveToSupabase();  // 합친 결과를 클라우드에 (read-merge-write로 안전)
    }
    render();
    fillNextRound();
    var maxR = 0;
    for (var i = 0; i < data[currentTab].length; i++) if (data[currentTab][i].round > maxR) maxR = data[currentTab][i].round;
    setSyncStatus('synced', '최신 ' + maxR + '회 · 동기화 완료');
    alert('동기화 완료!\n기본 ' + data.basic.length + '회 / 프리미엄 ' + data.premium.length + '회 / 푸드 ' + data.food.length + '회');
  } catch (e) {
    setSyncStatus('error', '동기화 실패');
    alert('동기화 실패: ' + (e.message || e));
  }
}

async function init() {
  // 일단 localStorage에서 로드 (즉시 렌더)
  loadData();
  // 🔧 추천 히스토리에서 유실 회차 복구 (동기화 사고 대비)
  recoverFromRecHistory();

  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].addEventListener('click', function (e) {
      currentTab = e.currentTarget.dataset.tab;
      // 탭 전환 시 입력 필드 초기화 후 새 탭의 회차로 갱신
      document.getElementById('inp-round').value = '';
      document.getElementById('inp-first').value = '';
      document.getElementById('inp-second').value = '';
      document.getElementById('inp-third').value = '';
      render();
      fillNextRound();
    });
  }

  document.getElementById('btn-add').addEventListener('click', handleAdd);

  // 새로고침(클라우드 동기화) — 헤더 + 푸터 둘 다
  var btnRefresh = document.getElementById('btn-refresh');
  if (btnRefresh) btnRefresh.addEventListener('click', manualRefresh);
  var btnRefreshTop = document.getElementById('btn-refresh-top');
  if (btnRefreshTop) btnRefreshTop.addEventListener('click', manualRefresh);
  // 백업/복원
  document.getElementById('btn-export').addEventListener('click', handleExport);
  document.getElementById('btn-import').addEventListener('click', function () {
    document.getElementById('file-input').click();
  });
  document.getElementById('file-input').addEventListener('change', handleImport);

  // 엔터로 등록
  var inputs = ['inp-round', 'inp-first', 'inp-second', 'inp-third'];
  for (var j = 0; j < inputs.length; j++) {
    document.getElementById(inputs[j]).addEventListener('keypress', function (e) {
      if (e.key === 'Enter') handleAdd();
    });
  }

  render();

  // Supabase 초기화 + 원격 데이터 로드
  setSyncStatus('syncing', '연결 중...');
  if (initSupabase()) {
    var remote = await loadFromSupabase();
    if (remote) {
      // ★ 데이터 손실 방지: 원격 무조건 덮어쓰기 → 로컬·원격 합집합(union)으로 변경.
      // 어느 한쪽도 버리지 않음 → 회차 많은 쪽 자동 보존. 동기화 충돌로 인한 롤백 방지.
      var beforeLen = data.basic.length + data.premium.length + data.food.length;
      data.basic   = unionRounds(data.basic,   Array.isArray(remote.basic)   ? remote.basic   : [], true);
      data.premium = unionRounds(data.premium, Array.isArray(remote.premium) ? remote.premium : [], true);
      data.food    = unionRounds(data.food,    Array.isArray(remote.food)    ? remote.food    : [], true);
      var afterLen = data.basic.length + data.premium.length + data.food.length;
      try {
        localStorage.setItem(STORAGE_KEY_BASIC, JSON.stringify(data.basic));
        localStorage.setItem(STORAGE_KEY_PREMIUM, JSON.stringify(data.premium));
        localStorage.setItem(STORAGE_KEY_FOOD, JSON.stringify(data.food));
      } catch (e) {}
      // 합집합 결과가 원격보다 회차가 많으면(=로컬에 더 최신 데이터) 원격도 복구 저장
      var remoteLen = (remote.basic||[]).length + (remote.premium||[]).length + (remote.food||[]).length;
      if (afterLen > remoteLen) {
        await saveToSupabase();
      }
      render();
    } else {
      // 원격에 데이터 없으면 로컬 데이터로 첫 동기화
      var hasAny = data.basic.length > 0 || data.premium.length > 0 || data.food.length > 0;
      if (hasAny) {
        await saveToSupabase();
      }
    }
  } else {
    setSyncStatus('local', '로컬 모드');
  }
}

// ============ 비밀번호 게이트 ============
var PASSWORD_HASH = '8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92';
var AUTH_KEY = 'chanceup_auth_v1';

async function sha256Hex(text) {
  var buf = new TextEncoder().encode(text);
  var hash = await crypto.subtle.digest('SHA-256', buf);
  var arr = Array.from(new Uint8Array(hash));
  return arr.map(function (b) { return b.toString(16).padStart(2, '0'); }).join('');
}

function unlock() {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
  init();
}

async function tryUnlock() {
  var input = document.getElementById('lock-input');
  var err = document.getElementById('lock-error');
  var card = document.getElementById('lock-card');
  var pw = input.value;
  if (!pw) return;
  var hash = await sha256Hex(pw);
  if (hash === PASSWORD_HASH) {
    try { localStorage.setItem(AUTH_KEY, 'true'); } catch (e) {}
    unlock();
  } else {
    err.textContent = '비밀번호가 틀려요';
    card.classList.add('shake');
    setTimeout(function () { card.classList.remove('shake'); }, 300);
    input.value = '';
    input.focus();
  }
}

function bootGate() {
  // 비밀번호 제거: 항상 자동 통과 + init 호출
  try { localStorage.setItem(AUTH_KEY, 'true'); } catch(e) {}
  try { var ls0 = document.getElementById('lock-screen'); if (ls0) ls0.style.display = 'none'; } catch(e) {}
  try { var mc0 = document.getElementById('main-content'); if (mc0) mc0.style.display = ''; } catch(e) {}
  try { if (typeof init === 'function') init(); } catch(e) {}
  return;
  // 이미 인증되어 있으면 바로 통과 (도달 안 함)
  try {
    if (localStorage.getItem(AUTH_KEY) === 'true') {
      unlock();
      return;
    }
  } catch (e) {}

  // 잠금 화면 이벤트 바인딩
  var btn = document.getElementById('lock-btn');
  var input = document.getElementById('lock-input');
  btn.addEventListener('click', tryUnlock);
  input.addEventListener('keypress', function (e) {
    if (e.key === 'Enter') tryUnlock();
  });
  input.focus();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', bootGate);
} else {
  bootGate();
}
</script>
