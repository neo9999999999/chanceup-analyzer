<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0b">
<title>찬스업 당첨 분석기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0a0a0b;
  --card: #15151a;
  --border: #27272a;
  --text: #f4f4f5;
  --text-dim: #a1a1aa;
  --gold: #d4a849;
  --purple: #a78bfa;
  --green: #34d399;
  --accent: var(--gold);
}

body.premium { --accent: var(--purple); }
body.food { --accent: var(--green); }

body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 20px 16px 40px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.container { max-width: 720px; margin: 0 auto; }

.header { text-align: center; margin-bottom: 24px; }
.header .eyebrow {
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 8px;
}
.header h1 {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.sync-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 10px;
  padding: 4px 10px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 999px;
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 600;
}
.sync-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #6b7280;
  flex-shrink: 0;
}
.sync-status.synced .sync-dot { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
.sync-status.syncing .sync-dot { background: #eab308; animation: pulse 1s infinite; }
.sync-status.error .sync-dot { background: #ef4444; }
.sync-status.local .sync-dot { background: #6b7280; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  padding: 4px;
  background: var(--card);
  border-radius: 12px;
  border: 1px solid var(--border);
}
.tab {
  flex: 1;
  padding: 12px 8px;
  border: none;
  border-radius: 8px;
  background: transparent;
  color: var(--text-dim);
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
  white-space: nowrap;
}
.tab.active {
  background: var(--accent);
  color: #1a1a1a;
}

.card {
  background: var(--card);
  border-radius: 16px;
  padding: 20px;
  border: 1px solid var(--border);
  margin-bottom: 16px;
}
.card.highlight {
  border-color: rgba(212, 168, 73, 0.4);
  position: relative;
  overflow: hidden;
}
body.premium .card.highlight {
  border-color: rgba(167, 139, 250, 0.4);
}
body.food .card.highlight {
  border-color: rgba(52, 211, 153, 0.4);
}
.card.highlight::before {
  content: '';
  position: absolute;
  top: -30px;
  right: -30px;
  width: 120px;
  height: 120px;
  background: var(--accent);
  opacity: 0.08;
  border-radius: 50%;
  filter: blur(40px);
  pointer-events: none;
}

.card-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.05em;
  margin-bottom: 14px;
}

.input-row {
  display: grid;
  grid-template-columns: 1.2fr 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
}

input[type="number"] {
  padding: 12px 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
  text-align: center;
  outline: none;
  width: 100%;
  font-family: inherit;
  -moz-appearance: textfield;
  appearance: textfield;
}
input[type="number"]:focus { border-color: var(--accent); }
input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

.btn-primary {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: var(--accent);
  color: #1a1a1a;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
  transition: opacity 0.2s;
}
.btn-primary:active { opacity: 0.8; }

.best-range-display {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.best-range-num {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -0.02em;
}
.best-range-meta {
  font-size: 14px;
  color: var(--text-dim);
}
.best-range-meta strong {
  color: var(--accent);
  font-weight: 700;
}

/* 🎯 베팅 추천 카드 */
.betting-info {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 14px;
  padding: 10px 12px;
  background: var(--bg);
  border-radius: 8px;
  line-height: 1.5;
}
.betting-info strong {
  color: var(--accent);
  font-weight: 700;
}
.betting-section {
  margin-bottom: 14px;
}
.betting-section-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 10px;
  letter-spacing: 0.03em;
}
.betting-section-title.warn {
  color: #ef4444;
}
.betting-numbers {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}
.betting-number {
  background: var(--accent);
  color: #1a1a1a;
  border-radius: 10px;
  padding: 14px 8px;
  text-align: center;
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.02em;
  position: relative;
}
/* 카운트 배지 기본 (흰색 계열) */
.betting-number .bn-count {
  position: absolute;
  top: 4px;
  right: 6px;
  font-size: 9px;
  font-weight: 700;
  background: rgba(255, 255, 255, 0.9);
  color: #1a1a1a;
  border-radius: 999px;
  padding: 1px 6px;
  letter-spacing: 0.03em;
  border: 1px solid rgba(255, 255, 255, 0.25);
}
/* 🥇 1등 배지 — 블랙 배경 + 탭 accent 컬러 */
.betting-number .bn-count.bn-first {
  background: #0a0a0b;
  color: var(--accent);
  border: 1.5px solid var(--accent);
  font-size: 10px;
  padding: 2px 9px;
  font-weight: 800;
}
/* 2·3등 — 약하게 표시 */
.betting-number .bn-count.bn-mix {
  background: rgba(255, 255, 255, 0.85);
  border: 1px solid rgba(255, 255, 255, 0.3);
}
/* 1등 흐름의 시퀀스 박스 배경 — 탭별 accent (시각적 구분) */
.betting-numbers.betting-numbers-gold .betting-number {
  background: var(--accent);
}
.betting-numbers.warn .betting-number {
  background: rgba(239, 68, 68, 0.15);
  color: #fca5a5;
  border: 1px solid rgba(239, 68, 68, 0.3);
}
.betting-numbers.warn .betting-number .bn-count {
  background: rgba(239, 68, 68, 0.3);
  color: #fff;
}
.betting-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin: 14px 0;
  padding: 14px;
  background: var(--bg);
  border-radius: 10px;
  border: 1px solid var(--border);
}
.betting-stat {
  text-align: center;
}
.betting-stat-label {
  font-size: 10px;
  color: var(--text-dim);
  font-weight: 600;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
}
.betting-stat-value {
  font-size: 18px;
  font-weight: 800;
  color: var(--accent);
}
.betting-empty {
  text-align: center;
  padding: 20px;
  color: var(--text-dim);
  font-size: 13px;
}

/* 1등 흐름 분석 */
.flow-recent {
  display: flex;
  flex-wrap: wrap;
  row-gap: 6px;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
  margin-bottom: 14px;
  padding: 14px;
  background: var(--bg);
  border-radius: 12px;
}
.flow-step {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 6px 10px 4px;
  background: var(--card);
  border-radius: 8px;
  border: 1px solid var(--border);
  white-space: nowrap;
  min-width: 50px;
  text-align: center;
  color: var(--text);
  line-height: 1.05;
  position: relative;
}
/* 번호대 컬러 — 박스 전체 면으로 채움 (라인 보더 X) */
/* 어두운 톤 (1~30) — 흰색 텍스트 */
.flow-step[data-decade="0"]  { background: #7f1d1d; color: #fff; border-color: #7f1d1d; }
.flow-step[data-decade="1"]  { background: #9a3412; color: #fff; border-color: #9a3412; }
.flow-step[data-decade="2"]  { background: #713f12; color: #fff; border-color: #713f12; }
/* 미들 톤 (31~60) — 흰색 텍스트 */
.flow-step[data-decade="3"]  { background: #4d7c0f; color: #fff; border-color: #4d7c0f; }
.flow-step[data-decade="4"]  { background: #15803d; color: #fff; border-color: #15803d; }
.flow-step[data-decade="5"]  { background: #0f766e; color: #fff; border-color: #0f766e; }
/* 밝은 톤 (61~100) — 검정 텍스트 */
.flow-step[data-decade="6"]  { background: #60a5fa; color: #0a0a0b; border-color: #60a5fa; }
.flow-step[data-decade="7"]  { background: #a78bfa; color: #0a0a0b; border-color: #a78bfa; }
.flow-step[data-decade="8"]  { background: #f0abfc; color: #0a0a0b; border-color: #f0abfc; }
.flow-step[data-decade="9"]  { background: #fcd34d; color: #0a0a0b; border-color: #fcd34d; }
/* (이전 .flow-step.latest 강조 제거 — 사용자 요청, 마지막 회차 별도 강조 X) */
/* 다음 회차 베팅 추천 영역 안 (베팅 시퀀스 73~82 같은 구간) */
.flow-step.in-hot-range {
  background: rgba(34, 197, 94, 0.18);
  color: #d1fae5;
  border-color: rgba(34, 197, 94, 0.5);
  border-style: dashed;
}
/* 반복 시그널 — 같은 십의자리 2회+ */
.flow-step.repeat-2 {
  border-color: var(--accent);
  color: var(--text);
  border-style: solid;
}
.flow-step.repeat-3 {
  border-color: var(--accent);
  color: var(--text);
  background: rgba(212, 168, 73, 0.1);
  border-width: 2px;
}
body.premium .flow-step.repeat-3 { background: rgba(167, 139, 250, 0.1); }
body.food .flow-step.repeat-3    { background: rgba(52, 211, 153, 0.1); }

/* 시퀀스 그룹 라벨 — 메인 (큰 글씨, 박스 면 색상에 따라 흰/검정) */
.flow-step-group {
  font-size: 13px;
  font-weight: 700;
  color: currentColor;
  letter-spacing: -0.01em;
}
/* 1등 번호 — 강조 배지 (블랙 배경 + 탭 accent 컬러) */
.flow-step-num {
  display: inline-block;
  font-size: 11px;
  font-weight: 800;
  padding: 1px 8px;
  border-radius: 999px;
  background: #0a0a0b;
  color: var(--accent);
  margin-top: 4px;
  letter-spacing: 0.02em;
  border: 1px solid var(--accent);
}
.flow-step.latest .flow-step-group { color: #1a1a1a; }
.flow-step.latest .flow-step-num {
  background: #0a0a0b;
  color: var(--accent);
  border-color: var(--accent);
}
.flow-step.in-hot-range .flow-step-group { color: #d1fae5; }

/* 1·2·3 혼합 흐름 박스 — 적중 개수별 채움 강도 */
.flow-step.bf-step { padding: 5px 8px; min-width: 60px; }
.flow-step.bf-step .bf-num {
  font-size: 9px;
  padding: 1px 5px;
  letter-spacing: 0;
  background: #0a0a0b;
  color: var(--accent);
  border: 1px solid var(--accent);
}
.flow-step.bf-step .bf-hits-label {
  font-size: 8px;
  color: var(--text-dim);
  margin-top: 2px;
  font-weight: 700;
}
.flow-step.bf-step.bf-hits-1 {
  background: color-mix(in srgb, var(--accent) 8%, transparent);
  border-color: color-mix(in srgb, var(--accent) 30%, transparent);
}
.flow-step.bf-step.bf-hits-2 {
  background: color-mix(in srgb, var(--accent) 20%, transparent);
  border-color: color-mix(in srgb, var(--accent) 50%, transparent);
}
.flow-step.bf-step.bf-hits-3 {
  background: color-mix(in srgb, var(--accent) 40%, transparent);
  border-color: var(--accent);
}
.flow-step.bf-step.bf-hits-3 .bf-hits-label { color: var(--accent); }

/* 십의자리 컬러 가이드 바 */
.decade-color-bar {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 2px;
  margin: 8px 0 12px;
  font-size: 9px;
  font-weight: 700;
  color: #1a1a1a;
}
.decade-color-bar > div {
  text-align: center;
  padding: 4px 2px;
  border-radius: 4px;
  letter-spacing: -0.02em;
}
/* 30이하 어두운 톤 — 흰색 텍스트 */
.decade-color-bar > div:nth-child(1)  { background: #7f1d1d; color: #fff; }
.decade-color-bar > div:nth-child(2)  { background: #9a3412; color: #fff; }
.decade-color-bar > div:nth-child(3)  { background: #713f12; color: #fff; }
/* 31~60 미들 톤 — 흰색 텍스트 */
.decade-color-bar > div:nth-child(4)  { background: #4d7c0f; color: #fff; }
.decade-color-bar > div:nth-child(5)  { background: #15803d; color: #fff; }
.decade-color-bar > div:nth-child(6)  { background: #0f766e; color: #fff; }
/* 61~100 밝은 톤 — 검정 텍스트 */
.decade-color-bar > div:nth-child(7)  { background: #60a5fa; color: #1a1a1a; }
.decade-color-bar > div:nth-child(8)  { background: #a78bfa; color: #1a1a1a; }
.decade-color-bar > div:nth-child(9)  { background: #f0abfc; color: #1a1a1a; }
.decade-color-bar > div:nth-child(10) { background: #fcd34d; color: #1a1a1a; }

/* 등수별 흐름 라벨 */
.flow-rank-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-dim);
  margin: 16px 0 8px;
  letter-spacing: 0.02em;
}
.flow-rank-label:first-of-type { margin-top: 6px; }

/* 흐름 카드 범례 */
.flow-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  font-size: 11px;
  color: var(--text-dim);
  margin: 10px 0 14px;
  padding: 10px 12px;
  background: var(--bg);
  border-radius: 8px;
  border: 1px solid var(--border);
}
.flow-legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
}
.flow-legend-swatch {
  display: inline-block;
  width: 12px; height: 12px;
  border-radius: 3px;
  border: 1px solid var(--border);
}
.flow-legend-swatch.latest { background: var(--accent); border-color: var(--accent); }
.flow-legend-swatch.hot { background: rgba(34, 197, 94, 0.3); border-color: rgba(34, 197, 94, 0.5); border-style: dashed; }
.flow-legend-swatch.repeat { background: var(--card); border-color: var(--accent); border-width: 2px; }
.flow-arrow {
  color: var(--text-dim);
  font-size: 11px;
  opacity: 0.5;
}

.flow-pred-header {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 12px;
  line-height: 1.5;
}
.flow-pred-header strong {
  color: var(--accent);
  font-weight: 700;
}
.flow-pred-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.flow-pred-item {
  padding: 10px 14px;
  background: var(--bg);
  border-radius: 10px;
  position: relative;
  overflow: hidden;
}
.flow-pred-item.top {
  border: 1px solid var(--accent);
}
.flow-pred-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 1;
}
.flow-pred-decade {
  font-size: 14px;
  font-weight: 700;
}
.flow-pred-stat {
  font-size: 12px;
  color: var(--accent);
  font-weight: 700;
}
.flow-pred-bar {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  background: var(--accent);
  opacity: 0.1;
  border-radius: 10px;
  transition: width 0.3s;
}

/* ⭐ 베팅 시퀀스 박스 (1·2·3 합산) — 탭별 accent 컬러 사용 */
.seq-main-card {
  background: color-mix(in srgb, var(--accent) 12%, transparent);
  border: 2px solid color-mix(in srgb, var(--accent) 45%, transparent);
  border-radius: 16px;
  padding: 18px;
  text-align: center;
  margin: 14px 0;
}
.seq-main-card .seq-main-label {
  color: var(--accent);
}
.seq-main-card .seq-main-range {
  color: var(--text);
}
/* 1등 시퀀스 박스 — 항상 금색 (1등 메달 의미, 탭과 무관) */
.seq-main-card.seq-first {
  background: linear-gradient(135deg, rgba(251, 191, 36, 0.16), rgba(245, 158, 11, 0.10));
  border-color: rgba(251, 191, 36, 0.5);
}
.seq-main-card.seq-first .seq-main-label {
  color: rgba(252, 211, 77, 1);
}
.seq-first-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid rgba(251, 191, 36, 0.2);
  font-size: 11px;
  color: var(--text-dim);
}
.seq-first-stats strong {
  display: block;
  color: rgba(252, 211, 77, 1);
  font-size: 14px;
  margin-top: 2px;
}
.seq-main-label {
  font-size: 12px;
  color: rgba(187, 247, 208, 1);
  font-weight: 700;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}
.seq-main-range {
  font-size: 36px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.02em;
  margin: 6px 0;
}
.seq-main-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 6px;
}

/* 🏆 빈도 TOP 10 */
.topfreq-info {
  font-size: 12px;
  color: var(--muted);
  margin: 8px 0 12px;
  line-height: 1.5;
}
.topfreq-table .col-rank {
  font-size: 14px;
  font-weight: 700;
}
tr.topfreq-rank-top3 {
  background: rgba(251, 191, 36, 0.08);
}
tr.topfreq-rank-top3 .col-num {
  color: #fbbf24;
}

/* 번호별 1·2·3등 출현 표 */
.rank-prob-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-top: 8px;
}
.rank-prob-table thead th {
  text-align: center;
  padding: 8px 4px;
  background: var(--bg);
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  border-bottom: 1px solid var(--border);
}
.rank-prob-table tbody td {
  padding: 8px 4px;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.rank-prob-table .col-num {
  font-weight: 800;
  color: var(--text);
  font-size: 15px;
}
.rank-prob-table .col-1 { color: #fbbf24; font-weight: 700; }
.rank-prob-table .col-2 { color: #94a3b8; font-weight: 600; }
.rank-prob-table .col-3 { color: #c084fc; font-weight: 600; }

}

// ============ 분석 ============
// 1등 번호 → 10단위 구간 (1: 1-10, 2: 11-20, ..., 10: 91-100)
function getDecade(n) {
  if (n === 100) return 10;
  return Math.ceil(n / 10);
}
function decadeLabel(d) {
  if (d === 1) return '1~10';
  if (d === 10) return '91~100';
  return ((d - 1) * 10 + 1) + '~' + (d * 10);
}

// 🏆 빈도 TOP 10 — 최근 N회 1등 출현 횟수만 기준 (사용자 요청)
function _topFrequencyNumbers(rounds, window, count) {
  count = count || 10;
  var win = rounds.length >= window ? rounds.slice(-window) : rounds.slice();
  var stats = {}; // num -> {c1}
  for (var n = 1; n <= 100; n++) stats[n] = { num: n, c1: 0 };
  for (var i = 0; i < win.length; i++) {
    stats[win[i].first].c1++;
  }
  var arr = [];
  for (var k in stats) {
    if (stats[k].c1 > 0) arr.push(stats[k]);
  }
  arr.sort(function(a, b) {
    if (b.c1 !== a.c1) return b.c1 - a.c1;
    return a.num - b.num;
  });
  return { top: arr.slice(0, count), windowSize: win.length };
}

// 특정 번호 num을 반드시 포함하는 sliding window 핫 시퀀스 (흐름 박스용)
function _slidingHotRangeContaining(rounds, num, window, weights) {
  weights = weights || [1, 1, 1];
  var win = rounds.length >= window ? rounds.slice(-window) : rounds.slice();
  if (win.length === 0) return { start: num, end: Math.min(num + 9, 100), hits: 0 };
  var counts = new Array(101).fill(0);
  for (var i = 0; i < win.length; i++) {
    counts[win[i].first]  += weights[0];
    counts[win[i].second] += weights[1];
    counts[win[i].third]  += weights[2];
  }
  // num을 포함하는 sliding 시작점 후보: s ∈ [max(1, num-9), min(91, num)]
  var sMin = Math.max(1, num - 9);
  var sMax = Math.min(91, num);
  var bestS = sMin, bestTotal = -1;
  for (var s = sMin; s <= sMax; s++) {
    var t = 0;
    for (var k = 0; k < 10; k++) t += counts[s + k];
    if (t > bestTotal) { bestTotal = t; bestS = s; }
  }
  return { start: bestS, end: bestS + 9, hits: bestTotal };
}

// 🌊 핫 구간 (Sliding Window + EWMA decay)
function _slidingHotRange(rounds, window, weights, decay) {
  weights = weights || [1, 1, 1];
  if (decay == null) decay = 1.0;
  var win = rounds.length >= window ? rounds.slice(-window) : rounds.slice();
  if (win.length === 0) return null;
  var counts = new Array(101).fill(0);
  var n = win.length;
  for (var i = 0; i < n; i++) {
    var wt = Math.pow(decay, n - 1 - i);
    counts[win[i].first]  += weights[0] * wt;
    counts[win[i].second] += weights[1] * wt;
    counts[win[i].third]  += weights[2] * wt;
  }
  // TOP-3 sliding windows of size 10 (s..s+9)
  var allRanges = [];
  for (var s = 1; s <= 91; s++) {
    var t = 0;
    for (var k = 0; k < 10; k++) t += counts[s+k];
    allRanges.push({ start: s, end: s+9, hits: t });
  }
  allRanges.sort(function(a, b){ return b.hits - a.hits; });
  var totalAll = counts.reduce(function(a,b){return a+b;}, 0);
  // 각 구간의 % (전체 가중 합 대비)
  for (var ri = 0; ri < allRanges.length; ri++) {
    allRanges[ri].pct = totalAll > 0 ? allRanges[ri].hits / totalAll : 0;
  }
  // TOP1 + 겹치지 않는 두 번째 핫존
  var top1 = allRanges[0];
  var top2 = null;
  for (var j = 1; j < allRanges.length; j++) {
    var r = allRanges[j];
    // 겹치지 않으면 후보
    if (r.start > top1.end || r.end < top1.start) {
      top2 = r;
      break;
    }
  }
  return {
    top: top2 ? [top1, top2] : [top1],
    windowSize: win.length,
    totalHits: totalAll
  };
}

// 번호별 1·2·3등 출현 카운트 (최근 윈도우 기준)
function _numberRankCounts(rounds, num, window) {
  var win = rounds.length >= window ? rounds.slice(-window) : rounds.slice();
  var c1 = 0, c2 = 0, c3 = 0;
  for (var i = 0; i < win.length; i++) {
    if (win[i].first === num) c1++;
    if (win[i].second === num) c2++;
    if (win[i].third === num) c3++;
  }
  return { c1: c1, c2: c2, c3: c3, total: win.length };
}

// 십의자리 그룹 마르코프 체인 — 다음 회차 예상 그룹 TOP-K + 시퀀스 시뮬레이션
function _groupMarkovDecades(sortedRows, topK) {
  if (!sortedRows || sortedRows.length < 2) return { topDecades: [], simSequence: [] };
  var tr = {}, ct = {};
  for (var i = 0; i < sortedRows.length - 1; i++) {
    var dp = getDecade(sortedRows[i].first);
    var dn = getDecade(sortedRows[i+1].first);
    if (!tr[dp]) tr[dp] = {};
    tr[dp][dn] = (tr[dp][dn] || 0) + 1;
    ct[dp] = (ct[dp] || 0) + 1;
  }
  var lastD = getDecade(sortedRows[sortedRows.length-1].first);
  var probs = [];
  if (ct[lastD] && tr[lastD]) {
    for (var k in tr[lastD]) {
      probs.push({ decade: parseInt(k, 10), p: tr[lastD][k] / ct[lastD] });
    }
    probs.sort(function(a, b){ return b.p - a.p; });
  }
  // 시퀀스 시뮬레이션: 다음 5회차 argmax 체인
  var sim = [];
  var cur = lastD;
  for (var s = 0; s < 5; s++) {
    if (!ct[cur] || !tr[cur]) break;
    var bestD = null, bestC = 0;
    for (var k2 in tr[cur]) {
      if (tr[cur][k2] > bestC) { bestC = tr[cur][k2]; bestD = parseInt(k2, 10); }
    }
    if (bestD === null) break;
    sim.push({ decade: bestD, p: bestC / ct[cur] });
    cur = bestD;
  }
  return { topDecades: probs.slice(0, topK || 5), simSequence: sim };
}

// 1·2·3등 혼합 흐름: 각 회차의 그 시점 sliding TOP1 시퀀스 + 1·2·3등 적중 개수
function _flowSequenceCombined(sorted) {
  var flowCfg = ALGO_CONFIG[currentTab] || ALGO_CONFIG.basic;
  var flowWinSize = flowCfg.window || 20;
  var weights = flowCfg.weights || [1, 1, 1];
  var seq = [];
  for (var i = 0; i < sorted.length; i++) {
    var r = sorted[i];
    // 그 회차 시점 sliding TOP1 (적중 판정용 — 그 시점 데이터로)
    var seqLabel = '', seqStart = null, seqEnd = null;
    var hits = 0, hit1 = false, hit2 = false, hit3 = false;
    if (i >= 20) {
      var prevHr = _slidingHotRange(sorted.slice(0, i), flowWinSize, weights);
      if (prevHr && prevHr.top && prevHr.top[0]) {
        seqStart = prevHr.top[0].start;
        seqEnd = prevHr.top[0].end;
        seqLabel = seqStart + '~' + seqEnd;
        hit1 = (r.first  >= seqStart && r.first  <= seqEnd);
        hit2 = (r.second >= seqStart && r.second <= seqEnd);
        hit3 = (r.third  >= seqStart && r.third  <= seqEnd);
        hits = (hit1 ? 1 : 0) + (hit2 ? 1 : 0) + (hit3 ? 1 : 0);
      }
    }
    // 박스 안 표시할 번호: 적중한 1·2·3등 번호들 (없으면 그 회차 1등)
    var displayNums = [];
    if (hit1) displayNums.push(r.first);
    if (hit2) displayNums.push(r.second);
    if (hit3) displayNums.push(r.third);
    if (displayNums.length === 0) displayNums = [r.first];  // fallback
    if (!seqLabel) {
      // 데이터 부족 fallback: 1등 중심
      seqStart = Math.max(1, r.first - 4);
      seqEnd = Math.min(100, seqStart + 9);
      if (seqEnd === 100) seqStart = 91;
      seqLabel = seqStart + '~' + seqEnd;
    }
    seq.push({
      round: r.round,
      seqLabel: seqLabel,
      seqStart: seqStart,
      seqEnd: seqEnd,
      hits: hits,
      hit1: hit1, hit2: hit2, hit3: hit3,
      first: r.first, second: r.second, third: r.third,
      displayNums: displayNums
    });
  }
  return seq;
}

// 🎯 1등 추천 흐름 v10.9 — 마르코프(다음 흐름 예측) 기반 OOS
// 각 회차 R: R-1까지의 데이터로 _nextFlowPrediction → 예측 TOP1 시퀀스
// 실제 R의 1등이 그 안 들어가면 면처리. 다음 흐름 예측 카드와 일관.
function _recommendationFlow(sorted) {
  var seq = [];
  for (var i = 1; i < sorted.length; i++) {
    var prevData = sorted.slice(0, i);
    if (prevData.length < 15) {
      seq.push({ round: sorted[i].round, num: sorted[i].first, seqLabel: '데이터부족', hit: false });
      continue;
    }
    var pred = _nextFlowPrediction(prevData);
    if (!pred || !pred.top || !pred.top[0]) {
      seq.push({ round: sorted[i].round, num: sorted[i].first, seqLabel: '?', hit: false });
      continue;
    }
    var t = pred.top[0];
    var actualFirst = sorted[i].first;
    var hit = (actualFirst >= t.start && actualFirst <= t.end);
    seq.push({
      round: sorted[i].round,
      num: actualFirst,
      seqLabel: t.start + '~' + t.end,
      seqStart: t.start,
      seqEnd: t.end,
      hit: hit,
      predPct: pred.top[0].pct
    });
  }
  return seq;
}

// 2·3등 흐름 시퀀스 계산 (1등 흐름과 동일 로직, rank만 다름)
function _flowSequenceForRank(sorted, rankKey) {
  var flowCfg = ALGO_CONFIG[currentTab] || ALGO_CONFIG.basic;
  var flowWinSize = flowCfg.window || 20;
  var weights = flowCfg.weights || [1, 1, 1];
  var seq = [];
  for (var i = 0; i < sorted.length; i++) {
    var num = sorted[i][rankKey];
    if (!num) continue;
    // 그 회차 등수 번호를 포함하는 핫 시퀀스
    var seqLabel = '', seqStart = null, seqEnd = null;
    if (i >= 1) {
      var pastHr = _slidingHotRangeContaining(sorted.slice(0, i + 1), num, flowWinSize, weights);
      if (pastHr) {
        seqStart = pastHr.start;
        seqEnd = pastHr.end;
        seqLabel = seqStart + '~' + seqEnd;
      }
    }
    if (!seqLabel) {
      seqStart = Math.max(1, num - 4);
      seqEnd = Math.min(100, seqStart + 9);
      if (seqEnd === 100) seqStart = 91;
      seqLabel = seqStart + '~' + seqEnd;
    }
    // 적중 여부: R-1까지의 sliding TOP1에 그 등수 번호 들어가는지
    var hit = false;
    if (i >= 20) {
      var prevHr = _slidingHotRange(sorted.slice(0, i), flowWinSize, weights);
      if (prevHr && prevHr.top && prevHr.top[0]) {
        hit = (num >= prevHr.top[0].start && num <= prevHr.top[0].end);
      }
    }
    seq.push({
      round: sorted[i].round,
      num: num,
      seqLabel: seqLabel,
      seqStart: seqStart,
      seqEnd: seqEnd,
      hit: hit
    });
  }
  return seq;
}

function analyzeFlow(rows) {
  if (rows.length < 2) return null;
  var sorted = rows.slice();
  sorted.sort(function (a, b) { return a.round - b.round; });

  var transitions = {};  // {fromDecade: {toDecade: count}}
  var sequence = [];     // [{round, decade, num, seqLabel, seqStart, seqEnd}]
  var flowCfg = ALGO_CONFIG[currentTab] || ALGO_CONFIG.basic;
  var flowWinSize = flowCfg.window || 20;

  for (var i = 0; i < sorted.length; i++) {
    var d = getDecade(sorted[i].first);
    var num = sorted[i].first;
    // 그 회차 1등 번호를 반드시 포함하는 sliding 핫 시퀀스 (그 시점까지의 데이터)
    var seqLabel = '', seqStart = null, seqEnd = null;
    if (i >= 1) {
      var pastHr = _slidingHotRangeContaining(sorted.slice(0, i + 1), num, flowWinSize, flowCfg.weights || [1,1,1]);
      if (pastHr) {
        seqStart = pastHr.start;
        seqEnd = pastHr.end;
        seqLabel = seqStart + '~' + seqEnd;
      }
    }
    if (!seqLabel) {
      seqStart = Math.max(1, num - 4);
      seqEnd = Math.min(100, seqStart + 9);
      if (seqEnd === 100) seqStart = 91;
      seqLabel = seqStart + '~' + seqEnd;
    }
    // ★ 백테스트 적중 여부: R-1까지의 데이터로 베팅 추천 시퀀스 계산 → 그 안에 R의 1등이 있는지
    // → 면(채움)은 이 hit=true일 때만 처리
    var hit = false;
    if (i >= 20) {  // 최소 20회 데이터로 추천 계산
      var prevHr = _slidingHotRange(sorted.slice(0, i), flowWinSize, flowCfg.weights || [1,1,1]);
      if (prevHr && prevHr.top && prevHr.top[0]) {
        hit = (num >= prevHr.top[0].start && num <= prevHr.top[0].end);
      }
    }
    sequence.push({
      round: sorted[i].round,
      decade: d,
      num: num,
      seqLabel: seqLabel,
      seqStart: seqStart,
      seqEnd: seqEnd,
      hit: hit
    });
    if (i > 0) {
      var prev = getDecade(sorted[i - 1].first);
      if (!transitions[prev]) transitions[prev] = {};
      if (!transitions[prev][d]) transitions[prev][d] = 0;
      transitions[prev][d]++;
    }
  }

  // 매 회차 예측 검증 (i번째 시점에 i-1까지의 누적 데이터로 i를 예측했다면 성공/실패 판정)
  // 기준 A (top1): 누적 분포에서 1위 구간이 실제 적중했는지
  // 기준 B (any): 누적 분포에 한번이라도 등장한 구간이 실제 적중했는지
  var predictions = [];
  for (var k = 2; k < sorted.length; k++) {
    // sorted[k]를 예측: sorted[0..k-1]까지의 데이터로 transitions 누적 계산
    var pastTrans = {};
    for (var m = 1; m < k; m++) {
      var pPrev = getDecade(sorted[m - 1].first);
      var pCurr = getDecade(sorted[m].first);
      if (!pastTrans[pPrev]) pastTrans[pPrev] = {};
      if (!pastTrans[pPrev][pCurr]) pastTrans[pPrev][pCurr] = 0;
      pastTrans[pPrev][pCurr]++;
    }
    var fromDecade = getDecade(sorted[k - 1].first);
    var actualDecade = getDecade(sorted[k].first);
    var distrib = pastTrans[fromDecade] || {};
    var distribEntries = [];
    for (var dKey in distrib) {
      distribEntries.push({ decade: parseInt(dKey, 10), count: distrib[dKey] });
    }
    distribEntries.sort(function (a, b) { return b.count - a.count; });

    var hasData = distribEntries.length > 0;
    var topDecade = hasData ? distribEntries[0].decade : null;
    var topHit = hasData && (topDecade === actualDecade);
    var anyHit = false;
    for (var dei = 0; dei < distribEntries.length; dei++) {
      if (distribEntries[dei].decade === actualDecade) { anyHit = true; break; }
    }
    predictions.push({
      round: sorted[k].round,
      fromDecade: fromDecade,
      actualDecade: actualDecade,
      actualNum: sorted[k].first,
      topDecade: topDecade,
      topHit: topHit,
      anyHit: anyHit,
      hasData: hasData
    });
  }

  var cfg = ALGO_CONFIG[currentTab] || ALGO_CONFIG.basic;
  var hotRange = _slidingHotRange(sorted, cfg.window || 20, cfg.weights || [1,1,1], cfg.decay || 1.0);
  var sequenceSecond = _flowSequenceForRank(sorted, 'second');
  var sequenceThird  = _flowSequenceForRank(sorted, 'third');
  // ★ 1등 추천 흐름 (진짜 OOS)
  var recommendationFlow = _recommendationFlow(sorted);

  return {
    sequence: sequence,
    sequenceSecond: sequenceSecond,
    sequenceThird: sequenceThird,
    recommendationFlow: recommendationFlow,
    transitions: transitions,
    predictions: predictions,
    hotRange: hotRange,
    nextRound: sorted[sorted.length - 1].round + 1
  };
}

// 🔁 다음 흐름 예측 — 직전 1등이 속한 시퀀스의 과거 사례에서 다음 회차 1등이 어디로 갔는지
// 진짜 'flow shift' 마르코프: A → B 패턴 (자기복귀가 아닌 이동)
function _nextFlowPrediction(sorted) {
  if (!sorted || sorted.length < 15) return null;
  var last = sorted[sorted.length - 1].first;
  // 직전 1등 포함 sliding TOP1 시퀀스
  var hr = _slidingHotRangeContaining(sorted, last, 20, [1, 0, 0]);
  if (!hr) return null;
  var lstart = hr.start, lend = hr.end;
  // 과거 1등이 [lstart, lend]에 들어간 회차들의 다음 회차 1등 모음
  var nextFirsts = [];
  for (var i = 0; i < sorted.length - 1; i++) {
    if (sorted[i].first >= lstart && sorted[i].first <= lend) {
      nextFirsts.push(sorted[i + 1].first);
    }
  }
  if (nextFirsts.length === 0) return null;
  // 다음 1등들의 sliding 분포
  var counts = new Array(101).fill(0);
  for (var i = 0; i < nextFirsts.length; i++) counts[nextFirsts[i]]++;
  var ranges = [];
  for (var s = 1; s <= 91; s++) {
    var c = 0;
    for (var k = 0; k < 10; k++) c += counts[s + k];
    if (c > 0) ranges.push({ start: s, end: s + 9, count: c, pct: c / nextFirsts.length });
  }
  ranges.sort(function(a, b){ return b.count - a.count; });
  // 겹치지 않는 TOP-3 (중복 sliding 제거)
  var top = [];
  for (var r = 0; r < ranges.length && top.length < 3; r++) {
    var overlaps = false;
    for (var u = 0; u < top.length; u++) {
      if (ranges[r].start <= top[u].end && ranges[r].end >= top[u].start) {
        overlaps = true; break;
      }
    }
    if (!overlaps) top.push(ranges[r]);
  }
  return {
    fromSeq: lstart + '~' + lend,
    lastFirst: last,
    totalSamples: nextFirsts.length,
    nextFirsts: nextFirsts,
    top: top
  };
}

// 🔁 흐름 트랜지션 마르코프 — 시퀀스 위치 이동 패턴 학습 (단순 빈도 X)
// 직전 sliding TOP1 시작점 → 다음 sliding TOP1 시작점 전이확률
function _flowTransitionMarkov(sorted, window, weights) {
  if (!sorted || sorted.length < 25) return null;
  weights = weights || [1, 0, 0]; // 1등만 기준
  // 각 회차 시점의 sliding TOP1 시작점 계산
  var states = [];
  for (var i = 20; i < sorted.length; i++) {
    var hr = _slidingHotRange(sorted.slice(0, i + 1), window, weights);
    states.push(hr && hr.top[0] ? hr.top[0].start : null);
  }
  // 트랜지션 매트릭스
  var transitions = {};
  var counts = {};
  for (var k = 1; k < states.length; k++) {
    var p = states[k - 1], n = states[k];
    if (p === null || n === null) continue;
    if (!transitions[p]) transitions[p] = {};
    transitions[p][n] = (transitions[p][n] || 0) + 1;
    counts[p] = (counts[p] || 0) + 1;
  }
  var lastState = states[states.length - 1];
  if (lastState === null || !transitions[lastState]) {
    return { lastState: lastState, topNext: [], note: '트랜지션 데이터 부족' };
  }
  // 마지막 상태에서의 다음 상태 분포 (확률 내림차순)
  var nextProbs = [];
  for (var k2 in transitions[lastState]) {
    var c = transitions[lastState][k2];
    nextProbs.push({
      start: parseInt(k2, 10),
      end: parseInt(k2, 10) + 9,
      count: c,
      pct: c / counts[lastState]
    });
  }
  nextProbs.sort(function(a, b){ return b.pct - a.pct; });
  return {
    lastState: lastState,
    lastSeqLabel: lastState + '~' + (lastState + 9),
    topNext: nextProbs.slice(0, 3),
    totalTransitions: counts[lastState]
  };
}

// 📚 추천 히스토리 저장/로드 (localStorage)
function _saveRecHistory(game, entry) {
  try {
    var key = 'chanceup_rec_history_' + game;
    var arr = JSON.parse(localStorage.getItem(key) || '[]');
    // 같은 회차 있으면 덮어씀
    arr = arr.filter(function(x){ return x.round !== entry.round; });

}
function _loadRecHistory(game) {

}

// ★ 자동 학습 v10.1 — 과적합 방지: 평가창 확대 + baseline 비교
// 평가창을 50회로 확대 (노이즈 ↓)
// baseline (W=20, (1,1,1))을 후보에 포함, 자동학습이 더 좋아야만 채택
function autoLearnAlgo(rows, evalLastN, startSafety) {
  evalLastN = evalLastN || 50;     // ★ 평가창 확대 20→50 (노이즈 감소)
  startSafety = startSafety || 20;
  if (!rows || rows.length < startSafety + 5) return null;
  var sorted = rows.slice().sort(function(a, b){ return a.round - b.round; });

  // 후보 그리드 (baseline 포함)
  var windows = [10, 12, 15, 20, 25, 30, 40];
  var weightSets = [[1,1,1], [2,1,1], [3,2,1], [4,2,1], [3,1,1]];
  var startIdx = Math.max(startSafety, sorted.length - evalLastN);

  var results = [];
  for (var wi = 0; wi < windows.length; wi++) {
    for (var ti = 0; ti < weightSets.length; ti++) {
      var win = windows[wi], wt = weightSets[ti];
      var h1 = 0, any = 0, hitsTotal = 0, tot = 0;
      for (var i = startIdx; i < sorted.length; i++) {
        var hr = _slidingHotRange(sorted.slice(0, i), win, wt);
        if (!hr || !hr.top || !hr.top[0]) continue;
        var t = hr.top[0], r = sorted[i];
        var ha = (r.first  >= t.start && r.first  <= t.end);
        var hb = (r.second >= t.start && r.second <= t.end);
        var hc = (r.third  >= t.start && r.third  <= t.end);
        if (ha) h1++;
        if (ha || hb || hc) any++;
        hitsTotal += (ha?1:0) + (hb?1:0) + (hc?1:0);
        tot++;
      }
      if (tot === 0) continue;
      var score = (h1 * 2 + any) / tot + hitsTotal / (tot * 3) * 0.5;
      results.push({ window: win, weights: wt, hit1: h1, hitAny: any, hitsTotal: hitsTotal, total: tot, score: score });
    }
  }
  if (results.length === 0) return null;
  // baseline (W=20, [1,1,1]) 점수
  var baseline = results.filter(function(r){ return r.window === 20 && r.weights[0] === 1 && r.weights[1] === 1 && r.weights[2] === 1; })[0];
  // 최고 점수
  results.sort(function(a, b){ return b.score - a.score; });
  var top = results[0];
  // 자동학습 선택이 baseline 대비 +5% 이상 좋아야만 채택 (그 외엔 baseline 유지)
  // 작은 차이는 과적합 가능성
  var THRESHOLD = 0.05;
  if (baseline && (top.score - baseline.score) < THRESHOLD) {
    top = baseline;
    top.note = 'baseline 유지 (과적합 회피)';
  } else {
    top.note = 'auto-selected';
  }
  return top;
}

// 자동 학습 v10.2 — OOS walk-forward 검증으로 baseline 못 넘으면 baseline 유지
// 솔직한 평가: 매 회차 i 시점에 i까지로 학습한 알고리즘이 i회차 적중하는지
// 평가창 = 최근 40회 OOS, baseline = W=20 (1,1,1) 정적
function _evaluateAlgoOOS(sorted, window, weights, evalLastN, decay) {
  if (decay == null) decay = 1.0;
  var startIdx = Math.max(30, sorted.length - evalLastN);
  var h1 = 0, any = 0, hitsTotal = 0, tot = 0;
  for (var i = startIdx; i < sorted.length; i++) {
    var hr = _slidingHotRange(sorted.slice(0, i), window, weights, decay);
    if (!hr || !hr.top || !hr.top[0]) continue;
    var t = hr.top[0], r = sorted[i];
    var ha = (r.first  >= t.start && r.first  <= t.end);
    var hb = (r.second >= t.start && r.second <= t.end);
    var hc = (r.third  >= t.start && r.third  <= t.end);
    if (ha) h1++;
    if (ha || hb || hc) any++;
    hitsTotal += (ha?1:0) + (hb?1:0) + (hc?1:0);
    tot++;
  }
  if (tot === 0) return null;
  return {
    window: window, weights: weights, decay: decay,
    hit1: h1, hitAny: any, hitsTotal: hitsTotal, total: tot,
    score: (h1 * 2 + any) / tot + hitsTotal / (tot * 3) * 0.5
  };
}

function runAutoLearn() {
  var rows = (typeof data !== 'undefined') ? data[currentTab] : [];
  // 게임별 v12 baseline (OOS 그리드 서치로 선정)
  var V12_BASE = {
    basic:   { window: 25, weights: [3,1,1], decay: 1.0 },
    premium: { window:  8, weights: [1,1,1], decay: 1.0 },
    food:    { window: 35, weights: [3,1,1], decay: 0.97 }
  };
  var bg = V12_BASE[currentTab] || V12_BASE.basic;
  if (!rows || rows.length < 60) {
    ALGO_CONFIG[currentTab] = { window: bg.window, weights: bg.weights, decay: bg.decay, auto: false };
    return;
  }
  var sorted = rows.slice().sort(function(a,b){return a.round-b.round;});

  // v12 baseline 자체를 OOS 평가
  var baselineEval = _evaluateAlgoOOS(sorted, bg.window, bg.weights, 50, bg.decay);

  // 확장 그리드 OOS 검증 (window × weights × decay)
  var windows = [10, 15, 20, 25, 30, 35, 40];
  var weightSets = [[1,1,1], [2,1,1], [3,1,1], [3,2,1], [4,2,1], [5,3,1], [2,2,1]];
  var decays = [1.0, 0.97, 0.95, 0.92, 0.90];
  var bestCand = null;
  for (var wi = 0; wi < windows.length; wi++) {
    for (var ti = 0; ti < weightSets.length; ti++) {
      for (var di = 0; di < decays.length; di++) {
        var ev = _evaluateAlgoOOS(sorted, windows[wi], weightSets[ti], 50, decays[di]);
        if (!ev) continue;
        if (!bestCand || ev.score > bestCand.score) bestCand = ev;
      }
    }
  }

  // baseline 대비 점수 +0.05 이상 좋아야 채택 (작은 차이는 baseline 유지)
  var THRESHOLD = 0.05;
  if (bestCand && baselineEval && (bestCand.score - baselineEval.score) >= THRESHOLD) {
    ALGO_CONFIG[currentTab] = {
      window: bestCand.window,
      weights: bestCand.weights,
      decay: bestCand.decay,
      auto: true,
      learnedAt: new Date().toISOString(),
      lastEval: bestCand,
      baselineEval: baselineEval
    };
  } else {
    // baseline 유지
    ALGO_CONFIG[currentTab] = {
      window: bg.window, weights: bg.weights, decay: bg.decay,
      auto: false,
      lastEval: baselineEval,
      note: 'v12 baseline 유지'
    };
  }
}

// 핫 점수: 최근 N회 1·2·3등 가중치 합 (decay 시간 감쇠)
function _scoreWindow(rounds, window, w1, w2, w3, decay) {
  var win = rounds.length >= window ? rounds.slice(-window) : rounds.slice();
  var sc = {}, n = win.length;
  for (var i = 0; i < n; i++) {
    var r = win[i];
    var wt = Math.pow(decay, n - 1 - i);
    sc[r.first]  = (sc[r.first]  || 0) + w1 * wt;
    sc[r.second] = (sc[r.second] || 0) + w2 * wt;
    sc[r.third]  = (sc[r.third]  || 0) + w3 * wt;
  }
  return sc;
}

// 콜드 점수: 최근 윈도우 내 마지막 등장 이후 경과 회차 수
function _coldScore(rounds, window) {
  var win = rounds.length >= window ? rounds.slice(-window) : rounds.slice();
  var lastIdx = {};
  for (var i = 0; i < win.length; i++) {
    var r = win[i];
    lastIdx[r.first] = i; lastIdx[r.second] = i; lastIdx[r.third] = i;
  }
  var cold = {};
  for (var n = 1; n <= 100; n++) {
    cold[n] = (lastIdx[n] !== undefined) ? (win.length - 1 - lastIdx[n]) : win.length;
  }
  return cold;
}

function _pickTopK(scores, slots) {
  var arr = [];
  for (var k in scores) arr.push({ n: parseInt(k, 10), s: scores[k] });
  arr.sort(function(a, b) { return (b.s !== a.s) ? (b.s - a.s) : (a.n - b.n); });
  var picked = arr.slice(0, slots);
  var used = {};
  for (var i = 0; i < picked.length; i++) used[picked[i].n] = true;
  for (var n = 1; n <= 100 && picked.length < slots; n++) {
    if (!used[n]) { picked.push({ n: n, s: 0 }); used[n] = true; }
  }
  return picked;
}

// 핫(빈도) + 콜드(반등) 결합 스코어
function _predictHybridCold(rounds, cfg) {
  var hot = _scoreWindow(rounds, cfg.window, cfg.weights[0], cfg.weights[1], cfg.weights[2], cfg.decay);
  var cold = _coldScore(rounds, cfg.cold_window);
  var maxHot = 0, maxCold = 0;
  for (var k in hot) if (hot[k] > maxHot) maxHot = hot[k];
  for (var k2 in cold) if (cold[k2] > maxCold) maxCold = cold[k2];
  if (maxHot === 0) maxHot = 1;
  if (maxCold === 0) maxCold = 1;
  var combined = {}, hotPart = {}, coldPart = {};
  for (var n = 1; n <= 100; n++) {
    var h = (hot[n] || 0) / maxHot;
    var c = (cold[n] || 0) / maxCold * cfg.cold_weight;
    combined[n] = h + c;
    hotPart[n] = hot[n] || 0;
    coldPart[n] = cold[n] || 0;
  }
  var top = _pickTopK(combined, 10);
  for (var i = 0; i < top.length; i++) {
    var num = top[i].n;
    top[i].rawHot = hotPart[num];
    top[i].rawCold = coldPart[num];
    // 신호 강도 비교 (cold_weight 영향 제외, 순수 정규화 강도로 분류)
    var hPct = (hotPart[num] || 0) / maxHot;
    var cPct = (coldPart[num] || 0) / maxCold;
    if (hPct - cPct > 0.2) top[i].kind = 'hot';
    else if (cPct - hPct > 0.2) top[i].kind = 'cold';
    else top[i].kind = 'mix';
  }
  return top;
}

// 마르코프 체인: 직전 회차 번호 → 다음 회차 번호 전이 확률
function _predictMarkov(rounds, cfg) {
  var rs = cfg.lookback ? (rounds.length >= cfg.lookback ? rounds.slice(-cfg.lookback) : rounds.slice()) : rounds.slice();
  if (rs.length < 2) {
    var fallback = [];
    for (var n = 1; n <= 10; n++) fallback.push({ n: n, s: 0, rawHot: 0, rawCold: 0, kind: 'mix' });
    return fallback;
  }
  var transitions = {}, counts = {};
  for (var i = 0; i < rs.length - 1; i++) {
    var prev = [rs[i].first, rs[i].second, rs[i].third];
    var next = [rs[i+1].first, rs[i+1].second, rs[i+1].third];
    for (var p = 0; p < prev.length; p++) {
      var pn = prev[p];
      counts[pn] = (counts[pn] || 0) + 1;
      if (!transitions[pn]) transitions[pn] = {};
      for (var q = 0; q < next.length; q++) {
        var nn = next[q];
        transitions[pn][nn] = (transitions[pn][nn] || 0) + 1;
      }
    }
  }
  var last = rounds[rounds.length - 1];
  var lastSet = [last.first, last.second, last.third];
  var score = {};
  for (var s = 0; s < lastSet.length; s++) {
    var lp = lastSet[s];
    if (!counts[lp] || !transitions[lp]) continue;
    for (var k in transitions[lp]) {
      score[k] = (score[k] || 0) + transitions[lp][k] / counts[lp];
    }
  }
  // 최근 출현 빈도도 보조로 (마르코프 예측 0이면 아무것도 안 나옴 방지)
  var recentHot = _scoreWindow(rounds, 20, 1, 1, 1, 1.0);
  var maxRecent = 0;
  for (var k2 in recentHot) if (recentHot[k2] > maxRecent) maxRecent = recentHot[k2];
  for (var n2 = 1; n2 <= 100; n2++) {
    if (!score[n2]) score[n2] = 0;
    score[n2] += (recentHot[n2] || 0) / Math.max(maxRecent, 1) * 0.05; // 작은 가중치
  }
  var top = _pickTopK(score, 10);
  for (var t = 0; t < top.length; t++) {
    var num = top[t].n;
    top[t].rawHot = recentHot[num] || 0;
    top[t].rawCold = 0;
    // 마르코프 신호가 강하면 "전이", 핫 위주면 "핫", 없으면 "믹스"
    var markovStrong = (score[num] - (recentHot[num]||0)/Math.max(maxRecent,1)*0.05) > 0.5;
    if (markovStrong) top[t].kind = 'markov';
    else if (recentHot[num] >= 3) top[t].kind = 'hot';
    else top[t].kind = 'mix';
  }
  return top;
}

// 윈도우 다른 핫 점수들의 정규화 합산
function _predictEnsemble(rounds, cfg) {
  var combined = {};
  for (var w = 0; w < cfg.windows.length; w++) {
    var sc = _scoreWindow(rounds, cfg.windows[w], cfg.weights[0], cfg.weights[1], cfg.weights[2], 1.0);
    var mx = 0;
    for (var k in sc) if (sc[k] > mx) mx = sc[k];
    if (mx === 0) mx = 1;
    for (var k2 in sc) combined[k2] = (combined[k2] || 0) + sc[k2] / mx;
  }
  // 원시 출현횟수: 가장 작은 윈도우 기준 (사용자에게 의미 있는 숫자)
  var smallWin = Math.min.apply(null, cfg.windows);
  var rawCount = {};
  var winSlice = rounds.length >= smallWin ? rounds.slice(-smallWin) : rounds.slice();
  for (var i = 0; i < winSlice.length; i++) {
    var r = winSlice[i];
    rawCount[r.first]  = (rawCount[r.first]  || 0) + 1;
    rawCount[r.second] = (rawCount[r.second] || 0) + 1;
    rawCount[r.third]  = (rawCount[r.third]  || 0) + 1;
  }
  var top = _pickTopK(combined, 10);
  for (var j = 0; j < top.length; j++) {
    top[j].rawHot = rawCount[top[j].n] || 0;
    top[j].rawCold = 0;
    top[j].kind = (top[j].rawHot >= 2 ? 'hot' : 'mix');
  }
  return top;
}

// 🎯 베팅 추천 분석 (v7: Sliding TOP1 시퀀스 = 자연 연속 10개 + 1·2·3등 합산)
function analyzeBetting(rows) {
  var stats = BETTING_STATS[currentTab] || BETTING_STATS.basic;
  if (!rows || rows.length < 1) {
    return { picked: [], dup2: [], windowSize: 0, stats: stats, algoLabel: '', sequence: null };
  }
  var sorted = rows.slice().sort(function(a, b){ return a.round - b.round; });
  var cfg = ALGO_CONFIG[currentTab] || ALGO_CONFIG.basic;
  var hr = _slidingHotRange(sorted, cfg.window, cfg.weights, cfg.decay || 1.0);
  if (!hr || !hr.top || !hr.top[0]) {
    return { picked: [], dup2: [], windowSize: 0, stats: stats, algoLabel: '', sequence: null };
  }
  var top1 = hr.top[0];
  var dup2 = [];
  for (var n = top1.start; n <= top1.end; n++) {
    // 각 번호의 1·2·3등 출현 카운트 (window 안)
    var cnts = _numberRankCounts(sorted, n, cfg.window);
    var raw = cnts.c1 + cnts.c2 + cnts.c3;
    var kind = 'mix';
    if (raw >= 2) kind = 'hot';
    dup2.push({
      number: n,
      count: raw,
      c1: cnts.c1, c2: cnts.c2, c3: cnts.c3,
      kind: kind
    });
  }
  // 1·2·3등 혼합 흐름 (베팅 카드 안에 표시)
  var combinedFlow = _flowSequenceCombined(sorted);
  return {
    picked: dup2,
    dup2: dup2,
    sequence: { start: top1.start, end: top1.end, pct: top1.pct, hits: top1.hits, totalHits: hr.totalHits, windowSize: hr.windowSize },
    windowSize: hr.windowSize,
    stats: stats,
    combinedFlow: combinedFlow,
    algoLabel: '핫 시퀀스 W' + cfg.window + ' (1·2·3등 가중합 ' + cfg.weights.join(':') + ')'
  };
}
function analyzeBettingBacktest(rows) {
  if (rows.length < 21) return null;
  var sorted = rows.slice();
  sorted.sort(function(a, b) { return a.round - b.round; });

  function pickFromWindow(win) {
    var counter = {}, lastSeen = {};
    for (var i = win.length - 1; i >= 0; i--) {
      var r = win[i];
      var nums = [r.first, r.second, r.third];
      for (var j = 0; j < 3; j++) {
        var n = nums[j];
        counter[n] = (counter[n] || 0) + 1;
        if (lastSeen[n] === undefined) lastSeen[n] = r.round;
      }
    }
    var dup2 = [], dup1 = [];
    for (var k in counter) {
      var item = { n: parseInt(k, 10), lr: lastSeen[k] };
      if (counter[k] === 2) dup2.push(item);
      else if (counter[k] === 1) dup1.push(item);
    }
    var sorter = function(a, b) {
      if (b.lr !== a.lr) return b.lr - a.lr;
      return a.n - b.n;
    };
    dup2.sort(sorter); dup1.sort(sorter);
    var picked = {};
    var cnt = 0;
    for (var p = 0; p < dup2.length && cnt < 10; p++) { picked[dup2[p].n] = true; cnt++; }
    for (var q = 0; q < dup1.length && cnt < 10; q++) { picked[dup1[q].n] = true; cnt++; }
    return picked;
  }

  var h1 = 0, h2 = 0, h3 = 0, total = 0;
  for (var k = 20; k < sorted.length; k++) {
    var win = sorted.slice(k - 20, k);
    var picked = pickFromWindow(win);
    var actual = sorted[k];
    if (picked[actual.first]) h1++;
    if (picked[actual.second]) h2++;
    if (picked[actual.third]) h3++;
    total++;
  }
  return { h1: h1, h2: h2, h3: h3, total: total };
}

function findRepeatNumbers(rows) {
  if (rows.length === 0) return [];
  var counter = {};
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var nums = [
      { n: r.first, label: r.round + '·1등' },
      { n: r.second, label: r.round + '·2등' },
      { n: r.third, label: r.round + '·3등' }
    ];
    for (var j = 0; j < nums.length; j++) {
      var key = nums[j].n;
      if (!counter[key]) counter[key] = [];
      counter[key].push(nums[j].label);
    }
  }
  var result = [];
  for (var k in counter) {
    if (counter[k].length >= 2) {
      result.push({
        number: parseInt(k, 10),
        count: counter[k].length,
        history: counter[k]
      });
    }
  }
  result.sort(function (a, b) {
    if (b.count !== a.count) return b.count - a.count;
    return a.number - b.number;
  });
  return result;
}

}

      }
      rhHtml += '<tr>' +
        '<td class="col-num">' + h.round + '</td>' +
        '<td style="font-weight:700;">' + h.recStart + '~' + h.recEnd + '</td>' +
        _cell(h.actualFirst, h.hit1) +
        _cell(h.actualSecond, h.hit2) +
        _cell(h.actualThird, h.hit3) +
        '<td>' + hitBadge + '</td>' +
        '</tr>';
    }
    rhHtml += '</tbody></table>';
    var totalH = recHist.length;
    var totH1 = recHist.filter(function(h){ return h.hit1; }).length;
    var totH2 = recHist.filter(function(h){ return h.hit2; }).length;
    var totH3 = recHist.filter(function(h){ return h.hit3; }).length;
    var totAny = recHist.filter(function(h){ return h.hitCount > 0; }).length;
    rhHtml += '<div style="margin-top:12px;padding:10px;background:var(--bg);border-radius:8px;border:1px solid var(--border);font-size:12px;">' +
      '<strong style="color:var(--accent);">📊 누적 적중률 (' + totalH + '회 기록)</strong><br>' +
      '1등 ' + totH1 + ' (' + (totH1/totalH*100).toFixed(0) + '%) · ' +
      '2등 ' + totH2 + ' (' + (totH2/totalH*100).toFixed(0) + '%) · ' +
      '3등 ' + totH3 + ' (' + (totH3/totalH*100).toFixed(0) + '%) · ' +
      '<strong>통합 ' + totAny + ' (' + (totAny/totalH*100).toFixed(0) + '%)</strong>' +
      '</div>';
    document.getElementById('rechistory-table').innerHTML = rhHtml;
  } else {
    recHistCard.style.display = 'none';
  }

  // 🏆 최근 1등 빈도 TOP 10 (회차 등록할 때마다 순위 변동)
  var topFreqCard = document.getElementById('topfreq-card');
  var freqWindow = (ALGO_CONFIG[currentTab] || ALGO_CONFIG.basic).window || 20;
  var freqResult = _topFrequencyNumbers(rows, freqWindow * 2, 10);
  if (freqResult.top.length > 0) {
    topFreqCard.style.display = 'block';
    var fHtml = '<div class="topfreq-info">최근 ' + freqResult.windowSize + '회 1등 출현 횟수 순위 · 회차 등록할 때마다 갱신</div>';
    fHtml += '<table class="rank-prob-table topfreq-table"><thead><tr>' +
      '<th>순위</th><th>번호</th><th>1등 출현</th><th>비율</th>' +
      '</tr></thead><tbody>';
    for (var fi = 0; fi < freqResult.top.length; fi++) {
      var ft = freqResult.top[fi];
      var rankCls = fi < 3 ? 'topfreq-rank-top3' : '';
      var rankEmoji = fi === 0 ? '🥇' : fi === 1 ? '🥈' : fi === 2 ? '🥉' : (fi+1);
      var pct = freqResult.windowSize > 0 ? Math.round(ft.c1 / freqResult.windowSize * 100) : 0;
      fHtml += '<tr class="' + rankCls + '">' +
        '<td class="col-rank">' + rankEmoji + '</td>' +
        '<td class="col-num">' + ft.num + '</td>' +
        '<td class="col-1">' + ft.c1 + '회</td>' +
        '<td class="col-sum">' + pct + '%</td>' +
        '</tr>';
    }
    fHtml += '</tbody></table>';
    document.getElementById('topfreq-table').innerHTML = fHtml;
  } else {
    topFreqCard.style.display = 'none';
  }

  // 회차별 테이블
  var roundsList = document.getElementById('rounds-list');
  if (rows.length === 0) {
    roundsList.innerHTML = '<div class="empty-state">등록된 회차가 없습니다</div>';
  } else {
    var sorted = rows.slice();
    sorted.sort(function (a, b) { return b.round - a.round; });
    var roundsHtml = '';
    for (var n = 0; n < sorted.length; n++) {
      var row = sorted[n];
      roundsHtml += '<div class="round-item">' +
        '<div class="round-left">' +
          '<span class="round-num">' + row.round + '</span>' +
          '<div class="badges">' +
            '<span class="badge badge-1"><span class="badge-label">1등</span>' + row.first + '</span>' +
            '<span class="badge badge-2"><span class="badge-label">2등</span>' + row.second + '</span>' +
            '<span class="badge badge-3"><span class="badge-label">3등</span>' + row.third + '</span>' +
          '</div>' +
        '</div>' +
        '<button class="delete-btn" data-round="' + row.round + '">×</button>' +
        '</div>';
    }
    roundsList.innerHTML = roundsHtml;

    // 삭제 버튼
    var delBtns = roundsList.querySelectorAll('.delete-btn');
    for (var d = 0; d < delBtns.length; d++) {
      delBtns[d].addEventListener('click', function (e) {
        e.stopPropagation();
        var roundNum = parseInt(this.getAttribute('data-round'), 10);
        if (!isNaN(roundNum)) {
          handleDelete(roundNum);
        }
      });
    }
  }

  // 다음 회차 자동 채움 (입력 비어있을 때만)
  var roundInput = document.getElementById('inp-round');
  if (roundInput && !roundInput.value) {
    fillNextRound();
  }
}

// ============ 액션 ============
function handleAdd() {
  var r = parseInt(document.getElementById('inp-round').value, 10);
  var f = parseInt(document.getElementById('inp-first').value, 10);
  var s = parseInt(document.getElementById('inp-second').value, 10);
  var t = parseInt(document.getElementById('inp-third').value, 10);

  if (!r || !f || !s || !t) {
    alert('모든 항목을 입력해주세요');
    return;
  }
  if (f < 1 || f > 100 || s < 1 || s > 100 || t < 1 || t > 100) {
    alert('번호는 1~100 사이여야 합니다');
    return;
  }

  var current = getCurrent();
  var existing = null;
  for (var i = 0; i < current.length; i++) {
    if (current[i].round === r) {
      existing = current[i];
      break;
    }
  }

  // ★ 추천 히스토리 자동 저장 — 그 시점 추천을 캡처해서 결과랑 매칭
  // (회차 추가 전 시점의 추천 시퀀스를 저장, 실제 결과로 적중 여부 자동 계산)
  if (!existing) {
    var snapshotData = current.slice().sort(function(a,b){return a.round-b.round;});
    var cfgSnap = ALGO_CONFIG[currentTab] || { window: 20, weights: [1,1,1] };
    var hr = _slidingHotRange(snapshotData, cfgSnap.window, cfgSnap.weights);
    if (hr && hr.top && hr.top[0]) {
      var hits1 = (f >= hr.top[0].start && f <= hr.top[0].end);
      var hits2 = (s >= hr.top[0].start && s <= hr.top[0].end);
      var hits3 = (t >= hr.top[0].start && t <= hr.top[0].end);
      var hitCount = (hits1 ? 1 : 0) + (hits2 ? 1 : 0) + (hits3 ? 1 : 0);
      _saveRecHistory(currentTab, {
        round: r,
        recStart: hr.top[0].start,
        recEnd: hr.top[0].end,
        algoWindow: cfgSnap.window,
        algoWeights: cfgSnap.weights,
        actualFirst: f, actualSecond: s, actualThird: t,
        hit1: hits1, hit2: hits2, hit3: hits3,
        hitCount: hitCount,
        ts: new Date().toISOString()
      });
    }
  }

  if (existing) {
    if (!confirm(r + '회차가 이미 존재합니다. 덮어쓸까요?')) return;
    existing.first = f;
    existing.second = s;
    existing.third = t;
  } else {
    current.push({ round: r, first: f, second: s, third: t });
    current.sort(function (a, b) { return a.round - b.round; });
  }

  saveData();
  render();

  // 입력 비우기 + 다음 회차 자동 채움
  document.getElementById('inp-first').value = '';
  document.getElementById('inp-second').value = '';
  document.getElementById('inp-third').value = '';
  fillNextRound();
  document.getElementById('inp-first').focus();
}

function fillNextRound() {
  var current = getCurrent();
  var roundInput = document.getElementById('inp-round');
  if (current.length === 0) {
    roundInput.value = '';
    return;
  }
  var maxRound = 0;
  for (var i = 0; i < current.length; i++) {
    if (current[i].round > maxRound) maxRound = current[i].round;
  }
  roundInput.value = maxRound + 1;
}

function handleDelete(roundNum) {
  if (!confirm(roundNum + '회차를 삭제할까요?')) return;
  var current = getCurrent();
  var filtered = [];
  for (var i = 0; i < current.length; i++) {
    if (current[i].round !== roundNum) {
      filtered.push(current[i]);
    }
  }
  data[currentTab] = filtered;
  saveData();
  render();
}

function handleExport() {
  var payload = {
    version: 1,
    exported_at: new Date().toISOString(),
    basic: data.basic,
    premium: data.premium,
    food: data.food
  };
  var blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  var ts = new Date().toISOString().slice(0, 10);
  a.download = 'chanceup-backup-' + ts + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function handleImport(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function (ev) {
    try {
      var parsed = JSON.parse(ev.target.result);
      if (!parsed || (!parsed.basic && !parsed.premium && !parsed.food)) {
        alert('잘못된 백업 파일입니다');
        return;
      }
      var msg = '복원하면 현재 데이터가 덮어써집니다.\n계속할까요?\n\n';
      if (parsed.basic) msg += '기본: ' + parsed.basic.length + '회차\n';
      if (parsed.premium) msg += '프리미엄: ' + parsed.premium.length + '회차\n';
      if (parsed.food) msg += '푸드박스: ' + parsed.food.length + '회차';
      if (!confirm(msg)) return;

      if (parsed.basic) data.basic = parsed.basic;
      if (parsed.premium) data.premium = parsed.premium;
      if (parsed.food) data.food = parsed.food;
      saveData();
      render();
      alert('복원 완료!');
    } catch (err) {
      alert('파일을 읽을 수 없습니다: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ============ 초기화 ============
async function init() {
  // 일단 localStorage에서 로드 (즉시 렌더)
  loadData();

  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].addEventListener('click', function (e) {
      currentTab = e.currentTarget.dataset.tab;
      // 탭 전환 시 입력 필드 초기화 후 새 탭의 회차로 갱신
      document.getElementById('inp-round').value = '';
      document.getElementById('inp-first').value = '';
      document.getElementById('inp-second').value = '';
      document.getElementById('inp-third').value = '';
      render();
      fillNextRound();
    });
  }

  document.getElementById('btn-add').addEventListener('click', handleAdd);

  // 백업/복원
  document.getElementById('btn-export').addEventListener('click', handleExport);
  document.getElementById('btn-import').addEventListener('click', function () {
    document.getElementById('file-input').click();
  });
  document.getElementById('file-input').addEventListener('change', handleImport);

  // 엔터로 등록
  var inputs = ['inp-round', 'inp-first', 'inp-second', 'inp-third'];
  for (var j = 0; j < inputs.length; j++) {
    document.getElementById(inputs[j]).addEventListener('keypress', function (e) {
      if (e.key === 'Enter') handleAdd();
    });
  }

  render();

  // Supabase 초기화 + 원격 데이터 로드
  setSyncStatus('syncing', '연결 중...');
  if (initSupabase()) {
    var remote = await loadFromSupabase();
    if (remote) {
      // 원격 데이터가 있으면 로컬보다 우선 (마지막 저장이 ground truth)
      if (Array.isArray(remote.basic)) data.basic = remote.basic;
      if (Array.isArray(remote.premium)) data.premium = remote.premium;
      if (Array.isArray(remote.food)) data.food = remote.food;
      // 로컬에도 백업
      try {
        localStorage.setItem(STORAGE_KEY_BASIC, JSON.stringify(data.basic));
        localStorage.setItem(STORAGE_KEY_PREMIUM, JSON.stringify(data.premium));
        localStorage.setItem(STORAGE_KEY_FOOD, JSON.stringify(data.food));
      } catch (e) {}
      render();
    } else {
      // 원격에 데이터 없으면 로컬 데이터로 첫 동기화
      var hasAny = data.basic.length > 0 || data.premium.length > 0 || data.food.length > 0;
      if (hasAny) {
        await saveToSupabase();
      }
    }
  } else {
    setSyncStatus('local', '로컬 모드');
  }
}

// ============ 비밀번호 게이트 ============
var PASSWORD_HASH = '8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92';
var AUTH_KEY = 'chanceup_auth_v1';

async function sha256Hex(text) {
  var buf = new TextEncoder().encode(text);
  var hash = await crypto.subtle.digest('SHA-256', buf);
  var arr = Array.from(new Uint8Array(hash));
  return arr.map(function (b) { return b.toString(16).padStart(2, '0'); }).join('');
}

function unlock() {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
  init();
}

async function tryUnlock() {
  var input = document.getElementById('lock-input');
  var err = document.getElementById('lock-error');
  var card = document.getElementById('lock-card');
  var pw = input.value;
  if (!pw) return;
  var hash = await sha256Hex(pw);
  if (hash === PASSWORD_HASH) {
    try { localStorage.setItem(AUTH_KEY, 'true'); } catch (e) {}
    unlock();
  } else {
    err.textContent = '비밀번호가 틀려요';
    card.classList.add('shake');
    setTimeout(function () { card.classList.remove('shake'); }, 300);
    input.value = '';
    input.focus();
  }
}

function bootGate() {
  // 비밀번호 제거: 항상 자동 통과 + init 호출
  try { localStorage.setItem(AUTH_KEY, 'true'); } catch(e) {}
  try { var ls0 = document.getElementById('lock-screen'); if (ls0) ls0.style.display = 'none'; } catch(e) {}
  try { var mc0 = document.getElementById('main-content'); if (mc0) mc0.style.display = ''; } catch(e) {}
  try { if (typeof init === 'function') init(); } catch(e) {}
  return;
  // 이미 인증되어 있으면 바로 통과 (도달 안 함)
  try {
    if (localStorage.getItem(AUTH_KEY) === 'true') {
      unlock();
      return;
    }
  } catch (e) {}

  // 잠금 화면 이벤트 바인딩
  var btn = document.getElementById('lock-btn');
  var input = document.getElementById('lock-input');
  btn.addEventListener('click', tryUnlock);
  input.addEventListener('keypress', function (e) {
    if (e.key === 'Enter') tryUnlock();
  });
  input.focus();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', bootGate);
} else {
  bootGate();
}
</script>
